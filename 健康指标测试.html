<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>健康指标测试 - 吃了么</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #fef9e8;
      font-family: -apple-system, "PingFang SC", "Noto Sans SC", system-ui, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .header {
      position: sticky;
      top: 0;
      z-index: 50;
      width: 100%;
      background: #fff9f0;
      border-bottom: 1px solid #f0e4d4;
      padding: 0 1rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 56px;
    }
    .back-btn {
      width: 2.5rem;
      height: 2.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 0.5rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    .back-btn:hover { background: #f0e4d4; }
    .back-btn svg { width: 1.5rem; height: 1.5rem; stroke: #5a3e2b; stroke-width: 2.5; }
    .title {
      flex: 1;
      text-align: center;
      font-size: 1rem;
      font-weight: 600;
      color: #5a3e2b;
    }
    .main-content {
      flex: 1;
      overflow-y: auto;
      padding: 1rem;
      padding-bottom: 80px;
      scrollbar-width: thin;
    }
    .card {
      background: white;
      border-radius: 1rem;
      border: 1px solid #f0e4d4;
      padding: 1.25rem;
      margin-bottom: 1rem;
    }
    .section-title {
      font-size: 1rem;
      font-weight: 600;
      color: #5a3e2b;
      margin-bottom: 0.75rem;
    }
    .bmi-card {
      background: #ecfdf5;
      border-color: #a7f3d0;
    }
    .bmi-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 0.5rem;
    }
    .bmi-value {
      text-align: right;
    }
    .bmi-value .label {
      font-size: 0.7rem;
      color: #a07a5c;
    }
    .bmi-value .number {
      font-size: 1.8rem;
      font-weight: 700;
      color: #5a3e2b;
    }
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      background: linear-gradient(135deg, #10b981, #059669);
      color: white;
      padding: 0.3rem 0.8rem;
      border-radius: 2rem;
      font-size: 0.8rem;
      font-weight: 500;
    }
    .advice-text {
      margin: 0.75rem 0;
      font-size: 0.9rem;
      color: #5a3e2b;
    }
    .advice-detail {
      font-size: 0.8rem;
      color: #a07a5c;
      font-style: italic;
    }
    .info-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 0.75rem;
      margin-top: 1rem;
      padding-top: 1rem;
      border-top: 1px solid #f0e4d4;
    }
    .info-item {
      text-align: center;
    }
    .info-label {
      font-size: 0.7rem;
      color: #a07a5c;
    }
    .info-value {
      font-size: 1rem;
      font-weight: 600;
      color: #5a3e2b;
    }
    .input-group {
      margin-bottom: 1rem;
    }
    .input-group label {
      display: block;
      font-size: 0.85rem;
      font-weight: 500;
      margin-bottom: 0.25rem;
      color: #5a3e2b;
    }
    .input-group input {
      width: 100%;
      padding: 0.7rem;
      border: 1px solid #e2d4c8;
      border-radius: 0.75rem;
      font-size: 1rem;
      background: white;
    }
    .btn-primary {
      width: 100%;
      background: #e67e22;
      border: none;
      border-radius: 2rem;
      padding: 0.8rem;
      font-size: 1rem;
      font-weight: 600;
      color: white;
      cursor: pointer;
      margin-top: 1rem;
    }
    .btn-secondary {
      width: 100%;
      background: transparent;
      border: 1px solid #e2d4c8;
      border-radius: 2rem;
      padding: 0.8rem;
      font-size: 1rem;
      font-weight: 600;
      color: #a07a5c;
      cursor: pointer;
      margin-top: 0.5rem;
    }
    .metrics-row {
      display: flex;
      gap: 1rem;
      margin: 1rem 0;
    }
    .metric-card {
      flex: 1;
      background: #fffbf5;
      border-radius: 0.75rem;
      padding: 0.75rem;
      text-align: center;
    }
    .metric-icon svg { width: 1.2rem; height: 1.2rem; stroke: #e67e22; }
    .metric-value {
      font-size: 1.5rem;
      font-weight: 700;
      color: #5a3e2b;
    }
    .suggestion-box {
      background: #fff7f0;
      border-left: 4px solid #e67e22;
      padding: 1rem;
      border-radius: 0.75rem;
      margin: 1rem 0;
    }
  </style>
  <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore-compat.js"></script>
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyCVdUzsAMepg1knrDg4ID7tM3xb_0ILyPM",
      authDomain: "beatricesaturn-6ff7e.firebaseapp.com",
      projectId: "beatricesaturn-6ff7e",
      storageBucket: "beatricesaturn-6ff7e.firebasestorage.app",
      messagingSenderId: "607338984635",
      appId: "1:607338984635:web:a4b3668715462a4d0ca59e",
      measurementId: "G-L2R10QZZL9"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    let currentUser = null;
    let currentProfile = null;

    auth.onAuthStateChanged(user => {
      if (user) {
        currentUser = user;
        loadProfile();
      } else {
        window.location.href = 'index.html';
      }
    });

    async function loadProfile() {
      try {
        const doc = await db.collection('profiles').doc(currentUser.uid).get();
        if (doc.exists) {
          currentProfile = doc.data();
        } else {
          currentProfile = null;
        }
        renderPage();
      } catch (err) {
        console.error(err);
        renderPage(); // 即使无数据也渲染
      }
    }

    function calculateBMI(weight, height) {
      if (!weight || !height) return null;
      const h = height / 100;
      return (weight / (h * h)).toFixed(1);
    }

    function getBMIInfo(bmi) {
      if (bmi < 18.5) return { status: '偏瘦', statusClass: 'status-underweight', advice: '体重偏轻，建议适当增加营养摄入。', detail: '多摄入优质蛋白和健康脂肪，保持三餐规律。' };
      if (bmi < 24) return { status: '健康', statusClass: 'status-healthy', advice: '当前BMI处于相对健康区间。', detail: '保持规律饮食与适量活动，继续稳定作息。' };
      if (bmi < 28) return { status: '超重', statusClass: 'status-overweight', advice: '体重超标，注意饮食控制和运动。', detail: '减少高热量食物，增加蔬菜和全谷物，每天坚持30分钟有氧运动。' };
      return { status: '肥胖', statusClass: 'status-obese', advice: '体重偏高，建议制定科学减重计划。', detail: '咨询营养师，控制总热量摄入，定期监测体重。' };
    }

    function renderPage() {
      const profile = currentProfile;
      const hasData = profile && profile.height && profile.weight;
      const bmi = hasData ? calculateBMI(profile.weight, profile.height) : null;
      const bmiInfo = bmi ? getBMIInfo(bmi) : null;
      const genderText = profile?.gender === 'female' ? '女' : (profile?.gender === 'male' ? '男' : (profile?.gender || '未设置'));
      const ageText = profile?.age || '--';
      const heightText = profile?.height || '--';
      const weightText = profile?.weight || '--';

      // 模拟精力值和睡眠质量（基于BMI和最近打卡记录，这里简化）
      const energy = hasData ? (bmi >= 18.5 && bmi < 24 ? 85 : 70) : 70;
      const sleep = hasData ? (bmi >= 18.5 && bmi < 24 ? 80 : 65) : 70;

      const dietSuggestion = hasData ? (bmiInfo.status === '偏瘦' ? '增加优质蛋白和健康脂肪，如鸡蛋、鱼肉、坚果。' : (bmiInfo.status === '超重' || bmiInfo.status === '肥胖' ? '控制总热量，多吃蔬菜，减少精制碳水。' : '晚餐尽量不要太晚，持续保持现有节律。')) : '完善信息后可获得更精准建议。';

      const html = `
        <div class="card bmi-card">
          <div class="bmi-header">
            <h2 class="section-title" style="margin-bottom:0;">BMI 健康指标</h2>
            <div class="bmi-value">
              <div class="label">当前 BMI</div>
              <div class="number">${bmi || '--'}</div>
            </div>
          </div>
          ${bmi ? `<div class="status-badge">${bmiInfo.status}</div>` : '<div class="status-badge" style="background:#c0a080;">未录入</div>'}
          <div class="advice-text">${bmi ? bmiInfo.advice : '请先填写身高体重，系统将自动计算您的BMI并给出建议。'}</div>
          <div class="advice-detail">💡 ${bmi ? bmiInfo.detail : '填写后即可看到个性化健康分析。'}</div>
          <div class="info-grid">
            <div class="info-item"><div class="info-label">身高</div><div class="info-value">${heightText} cm</div></div>
            <div class="info-item"><div class="info-label">体重</div><div class="info-value">${weightText} kg</div></div>
            <div class="info-item"><div class="info-label">年龄</div><div class="info-value">${ageText}</div></div>
            <div class="info-item"><div class="info-label">性别</div><div class="info-value">${genderText}</div></div>
          </div>
        </div>

        <div class="card">
          <div class="section-title">更新身体数据</div>
          <div class="input-group">
            <label>身高 (cm)</label>
            <input type="number" id="editHeight" placeholder="100-250" value="${profile?.height || ''}">
          </div>
          <div class="input-group">
            <label>体重 (kg)</label>
            <input type="number" id="editWeight" placeholder="20-200" value="${profile?.weight || ''}">
          </div>
          <button class="btn-primary" id="updateBtn">更新并保存</button>
        </div>

        <div class="card">
          <div class="section-title">健康指标概览</div>
          <div class="metrics-row">
            <div class="metric-card">
              <div class="metric-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 14a1 1 0 0 1-.78-1.63l9.9-10.2a.5.5 0 0 1 .86.46l-1.92 6.02A1 1 0 0 0 13 10h7a1 1 0 0 1 .78 1.63l-9.9 10.2a.5.5 0 0 1-.86-.46l1.92-6.02A1 1 0 0 0 11 14z"/></svg></div>
              <div class="metric-value">${energy}</div>
              <div class="metric-label">精力值</div>
            </div>
            <div class="metric-card">
              <div class="metric-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.985 12.486a9 9 0 1 1-9.473-9.472c.405-.022.617.46.402.803a6 6 0 0 0 8.268 8.268c.344-.215.825-.004.803.401"/></svg></div>
              <div class="metric-value">${sleep}</div>
              <div class="metric-label">睡眠质量</div>
            </div>
          </div>
        </div>

        <div class="suggestion-box">
          <div style="display:flex; gap:0.5rem; align-items:flex-start;">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#e67e22" stroke-width="2.5"><path d="M15 14c.2-1 .7-1.7 1.5-2.5 1-.9 1.5-2.2 1.5-3.5A6 6 0 0 0 6 8c0 1 .2 2.2 1.5 3.5.7.7 1.3 1.5 1.5 2.5"/><path d="M9 18h6"/><path d="M10 22h4"/></svg>
            <div>
              <div style="font-weight:600; margin-bottom:0.25rem;">膳食建议</div>
              <div style="font-size:0.85rem; color:#5a3e2b;">${dietSuggestion}</div>
            </div>
          </div>
        </div>

        <button class="btn-primary" id="aiAdviceBtn">✨ 查看个性化膳食建议</button>
        <button class="btn-secondary" id="nextMealBtn">➕ 去记录下一餐</button>
      `;

      document.getElementById('mainContent').innerHTML = html;

      document.getElementById('updateBtn').addEventListener('click', async () => {
        const newHeight = parseFloat(document.getElementById('editHeight').value);
        const newWeight = parseFloat(document.getElementById('editWeight').value);
        if (isNaN(newHeight) || isNaN(newWeight) || newHeight <= 0 || newWeight <= 0) {
          alert('请输入有效的身高和体重');
          return;
        }
        const newBmi = calculateBMI(newWeight, newHeight);
        try {
          await db.collection('profiles').doc(currentUser.uid).set({
            height: newHeight,
            weight: newWeight,
            bmi: parseFloat(newBmi),
            updatedAt: firebase.firestore.FieldValue.serverTimestamp()
          }, { merge: true });
          alert('更新成功！');
          loadProfile(); // 刷新页面数据
        } catch (err) {
          console.error(err);
          alert('保存失败：' + err.message);
        }
      });

      document.getElementById('aiAdviceBtn')?.addEventListener('click', () => {
        window.location.href = 'AI个性化膳食建议.html';
      });
      document.getElementById('nextMealBtn')?.addEventListener('click', () => {
        window.location.href = '打卡详情页.html';
      });
    }

    document.getElementById('backBtn').addEventListener('click', () => {
      window.location.href = '饮食管理首页.html';
    });
  </script>
</head>
<body>
  <header class="header">
    <div class="back-btn" id="backBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M15 18l-6-6 6-6" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <div class="title">健康指标测试</div>
    <div class="right-placeholder" style="width:2.5rem;"></div>
  </header>

  <main class="main-content" id="mainContent">
    <div style="text-align: center; padding: 2rem;">加载中...</div>
  </main>
</body>
</html>
