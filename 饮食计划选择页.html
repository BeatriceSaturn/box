<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>选择饮食计划 - 吃了么</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #fef9e8;
      font-family: -apple-system, "PingFang SC", "Noto Sans SC", system-ui, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem;
      background: #fff9f0;
      border-bottom: 1px solid #f0e4d4;
    }
    .back-btn {
      width: 2rem;
      height: 2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      border-radius: 50%;
    }
    .back-btn:hover { background: #f0e4d4; }
    .title { font-size: 1.1rem; font-weight: 600; color: #5a3e2b; }
    .main { flex: 1; overflow-y: auto; padding: 1rem; }
    .page-title h2 { font-size: 1.5rem; font-weight: 700; color: #5a3e2b; margin-bottom: 0.5rem; }
    .page-title p { font-size: 0.9rem; color: #a07a5c; }
    .plan-card {
      background: white;
      border-radius: 1rem;
      border: 2px solid #f0e4d4;
      padding: 1rem;
      margin-bottom: 1rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .plan-card.selected {
      border-color: #e67e22;
      background: #fff7f0;
    }
    .card-header { display: flex; gap: 0.75rem; margin-bottom: 0.5rem; }
    .card-icon { width: 3rem; height: 3rem; background: #fdf3e8; border-radius: 0.75rem; display: flex; align-items: center; justify-content: center; }
    .card-icon svg { width: 1.5rem; height: 1.5rem; stroke: #e67e22; stroke-width: 1.8; }
    .card-info h3 { font-size: 1rem; font-weight: 600; color: #5a3e2b; }
    .badge { display: inline-block; font-size: 0.7rem; padding: 0.2rem 0.6rem; border-radius: 20px; background: #fdf3e8; color: #e67e22; margin-top: 0.25rem; }
    .card-desc { font-size: 0.85rem; color: #a07a5c; margin: 0.5rem 0; }
    .tags { display: flex; gap: 0.5rem; margin: 0.5rem 0; flex-wrap: wrap; }
    .tag { background: #fdf3e8; padding: 0.2rem 0.6rem; border-radius: 20px; font-size: 0.7rem; }
    .feature { display: flex; gap: 0.5rem; margin-top: 0.5rem; font-size: 0.75rem; color: #5a3e2b; border-top: 1px solid #f0e4d4; padding-top: 0.5rem; }
    .confirm-btn {
      width: 100%;
      background: #d9c8b8;
      border: none;
      border-radius: 48px;
      padding: 0.9rem;
      font-size: 1rem;
      font-weight: 600;
      color: white;
      cursor: not-allowed;
      transition: all 0.2s;
      margin-top: 1rem;
    }
    .confirm-btn.active { background: #e67e22; cursor: pointer; }
  </style>
  <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore-compat.js"></script>
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyCVdUzsAMepg1knrDg4ID7tM3xb_0ILyPM",
      authDomain: "beatricesaturn-6ff7e.firebaseapp.com",
      projectId: "beatricesaturn-6ff7e",
      storageBucket: "beatricesaturn-6ff7e.firebasestorage.app",
      messagingSenderId: "607338984635",
      appId: "1:607338984635:web:a4b3668715462a4d0ca59e",
      measurementId: "G-L2R10QZZL9"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    let currentUser = null;
    let selectedPlan = null;

    auth.onAuthStateChanged(user => {
      if (user) {
        currentUser = user;
        loadSavedPlan();
      } else {
        window.location.href = 'index.html';
      }
    });

    async function loadSavedPlan() {
      const doc = await db.collection('plans').doc(currentUser.uid).get();
      if (doc.exists) {
        selectedPlan = doc.data().selectedPlan;
      }
      renderPage();
    }

    function renderPage() {
      const plans = [
        { id: '3day', name: '3天体验计划', duration: '3天', difficulty: '简单', desc: '用最轻量的方式重建三餐感知，适合刚开始想调整节奏的用户。', tags: ['固定早餐时间', '午餐不拖延'], feature: '快速建立“先吃饭再忙”的基础习惯。' },
        { id: '7day', name: '7天巩固计划', duration: '7天', difficulty: '简单', desc: '通过一周连续打卡，让规律吃饭形成可感知的节奏。', tags: ['三餐完整记录', '避免空腹过久'], feature: '让饮食规律开始稳定下来。' },
        { id: '14day', name: '14天平衡计划', duration: '14天', difficulty: '中等', desc: '在忙碌与健康之间找到更好的平衡，兼顾工作学习强度。', tags: ['合理加餐', '记录饮食心情'], feature: '建立更适合自己的饮食节律。' },
        { id: '21day', name: '21天蜕变计划', duration: '21天', difficulty: '困难', desc: '面向长期习惯重建，强调持续性与自我管理能力。', tags: ['精准计划执行', '每周复盘'], feature: '帮助用户形成更稳固的饮食惯性。' }
      ];

      const cardsHtml = plans.map(plan => `
        <div class="plan-card" data-plan="${plan.id}">
          <div class="card-header">
            <div class="card-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4"/><path d="M3 10h18"/><path d="M8 2v4"/><path d="M17 14h-6"/><path d="M13 18H7"/><path d="M7 14h.01"/><path d="M17 18h.01"/></svg></div>
            <div class="card-info"><h3>${plan.name}</h3><div class="badge">${plan.duration} · ${plan.difficulty}</div></div>
          </div>
          <div class="card-desc">${plan.desc}</div>
          <div class="tags">${plan.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
          <div class="feature"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#e67e22" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></svg> ${plan.feature}</div>
        </div>
      `).join('');

      const html = `
        <div class="card">
          <div class="page-title">
            <h2>选择你的计划</h2>
            <p>根据你的生活节奏，选择最适合的饮食习惯养成周期</p>
          </div>
          ${cardsHtml}
          <button class="confirm-btn ${selectedPlan ? 'active' : ''}" id="confirmBtn">确认计划</button>
        </div>
      `;

      document.getElementById('mainContent').innerHTML = html;

      // 高亮已选中的计划
      document.querySelectorAll('.plan-card').forEach(card => {
        const planId = card.getAttribute('data-plan');
        if (selectedPlan === planId) {
          card.classList.add('selected');
        }
        card.addEventListener('click', () => {
          document.querySelectorAll('.plan-card').forEach(c => c.classList.remove('selected'));
          card.classList.add('selected');
          selectedPlan = planId;
          const btn = document.getElementById('confirmBtn');
          btn.classList.add('active');
          btn.disabled = false;
        });
      });

      const confirmBtn = document.getElementById('confirmBtn');
      confirmBtn.addEventListener('click', async () => {
        if (!selectedPlan) return;
        await db.collection('plans').doc(currentUser.uid).set({ selectedPlan }, { merge: true });
        window.location.href = '计划详情页.html';
      });
    }

    document.getElementById('backBtn').addEventListener('click', () => {
      window.location.href = '核心目标设定页.html';
    });
  </script>
</head>
<body>
  <div class="header">
    <div class="back-btn" id="backBtn">←</div>
    <div class="title">选择饮食计划</div>
    <div style="width:2rem;"></div>
  </div>
  <div class="main" id="mainContent">
    <div style="text-align: center; padding: 2rem;">加载中...</div>
  </div>
</body>
</html>
