<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>计划详情 - 吃了么</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #fef9e8;
      font-family: -apple-system, "PingFang SC", "Noto Sans SC", system-ui, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    /* 头部样式 */
    .header {
      position: sticky;
      top: 0;
      z-index: 50;
      width: 100%;
      background: #fff9f0;
      border-bottom: 1px solid #f0e4d4;
      padding: 0 1rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 56px;
    }
    .back-btn {
      width: 2.5rem;
      height: 2.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 0.5rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    .back-btn:hover { background: #f0e4d4; }
    .back-btn svg { width: 1.5rem; height: 1.5rem; stroke: #5a3e2b; stroke-width: 2.5; }
    .title {
      flex: 1;
      text-align: center;
      font-size: 1rem;
      font-weight: 600;
      color: #5a3e2b;
    }
    .right-placeholder { width: 2.5rem; }

    /* 主内容滚动区 */
    .main-content {
      flex: 1;
      overflow-y: auto;
      padding: 1.25rem;
      padding-bottom: 120px;
      scrollbar-width: thin;
    }
    /* 卡片样式 */
    .detail-card {
      background: white;
      border-radius: 1rem;
      border: 1px solid #f0e4d4;
      padding: 1.25rem;
      margin-bottom: 1rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.02);
    }
    .plan-header {
      display: flex;
      gap: 1rem;
      align-items: center;
      margin-bottom: 1rem;
    }
    .plan-icon {
      width: 4rem;
      height: 4rem;
      background: #fdf3e8;
      border-radius: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .plan-icon svg { width: 2rem; height: 2rem; stroke: #e67e22; stroke-width: 1.8; }
    .plan-title h1 { font-size: 1.5rem; font-weight: 700; color: #5a3e2b; margin-bottom: 0.25rem; }
    .plan-title p { font-size: 0.85rem; color: #a07a5c; }
    .badge-group {
      display: flex;
      gap: 0.5rem;
      margin-top: 0.5rem;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.25rem;
      padding: 0.25rem 0.75rem;
      border-radius: 20px;
      font-size: 0.75rem;
      background: #fdf3e8;
      color: #e67e22;
    }
    .section-title {
      font-size: 1rem;
      font-weight: 600;
      color: #5a3e2b;
      margin: 1rem 0 0.75rem;
    }
    .step-list {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }
    .step-item {
      display: flex;
      gap: 0.75rem;
      align-items: flex-start;
      background: #fffbf5;
      padding: 0.75rem;
      border-radius: 0.75rem;
    }
    .step-num {
      width: 1.5rem;
      height: 1.5rem;
      background: #fdf3e8;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      font-weight: 700;
      color: #e67e22;
    }
    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
      margin: 0.5rem 0;
    }
    .info-box {
      background: #fffbf5;
      padding: 0.75rem;
      border-radius: 0.75rem;
    }
    .info-label {
      display: flex;
      align-items: center;
      gap: 0.25rem;
      font-size: 0.7rem;
      color: #a07a5c;
      margin-bottom: 0.25rem;
    }
    .info-value {
      font-size: 0.9rem;
      font-weight: 500;
      color: #5a3e2b;
    }
    .protocol-box {
      background: #fef5ea;
      padding: 0.75rem;
      border-radius: 0.75rem;
      font-size: 0.75rem;
      color: #5a3e2b;
      line-height: 1.5;
      margin-bottom: 1rem;
      max-height: 100px;
      overflow-y: auto;
    }
    .checkbox-item {
      display: flex;
      align-items: flex-start;
      gap: 0.5rem;
      margin: 1rem 0;
    }
    .checkbox-item input {
      width: 1.2rem;
      height: 1.2rem;
      margin-top: 0.1rem;
      accent-color: #e67e22;
    }
    .checkbox-item label {
      font-size: 0.85rem;
      color: #5a3e2b;
    }
    /* 底部按钮 */
    .bottom-buttons {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: linear-gradient(to top, #fef9e8 80%, transparent);
      padding: 1rem 1.25rem 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }
    .btn-primary {
      width: 100%;
      background: #d9c8b8;
      border: none;
      border-radius: 48px;
      padding: 0.9rem;
      font-size: 1rem;
      font-weight: 600;
      color: white;
      cursor: not-allowed;
      transition: all 0.2s;
    }
    .btn-primary.active {
      background: #e67e22;
      cursor: pointer;
      box-shadow: 0 4px 12px rgba(230,126,34,0.3);
    }
    .btn-primary.active:hover { background: #d4691a; transform: translateY(-1px); }
    .btn-secondary {
      width: 100%;
      background: transparent;
      border: 1px solid #e2d4c8;
      border-radius: 48px;
      padding: 0.9rem;
      font-size: 1rem;
      font-weight: 600;
      color: #a07a5c;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-secondary:hover { background: #f0e4d4; }
  </style>
</head>
<body>
  <header class="header">
    <div class="back-btn" id="backBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M15 18l-6-6 6-6" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <div class="title">计划详情</div>
    <div class="right-placeholder"></div>
  </header>

  <main class="main-content" id="mainContent">
    <!-- 动态内容将根据计划填充 -->
    <div style="text-align: center; padding: 2rem;">加载中...</div>
  </main>

  <div class="bottom-buttons">
    <button class="btn-primary" id="confirmBtn" disabled>确认协议并开始执行</button>
    <button class="btn-secondary" id="backToSelectBtn">返回选择</button>
  </div>

  <script>
    // 计划详情数据映射
    const plansData = {
      '3day': {
        name: '3天体验计划',
        description: '用最轻量的方式重建三餐感知，适合刚开始想调整节奏的用户。',
        icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11.017 2.814a1 1 0 0 1 1.966 0l1.051 5.558a2 2 0 0 0 1.594 1.594l5.558 1.051a1 1 0 0 1 0 1.966l-5.558 1.051a2 2 0 0 0-1.594 1.594l-1.051 5.558a1 1 0 0 1-1.966 0l-1.051-5.558a2 2 0 0 0-1.594-1.594l-5.558-1.051a1 1 0 0 1 0-1.966l5.558-1.051a2 2 0 0 0 1.594-1.594z"/><path d="M20 2v4"/><path d="M22 4h-4"/><circle cx="4" cy="20" r="2"/></svg>',
        duration: '3天',
        difficulty: '简单',
        steps: ['固定早餐时间', '午餐不拖延', '晚餐不过晚'],
        reminder: '温柔提醒',
        benefit: '快速建立“先吃饭再忙”的基础习惯。',
        protocol: '我已阅读并理解该3天计划的执行要求。我承诺在计划期间坚持每日打卡，记录饮食情况。我理解本计划旨在帮助我养成良好的饮食习惯，但不能替代专业医学建议。如有任何健康问题，我会咨询专业医生。'
      },
      '7day': {
        name: '7天巩固计划',
        description: '通过一周连续打卡，让规律吃饭形成可感知的节奏。',
        icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4"/><path d="M3 10h18"/><path d="M8 2v4"/><path d="M17 14h-6"/><path d="M13 18H7"/><path d="M7 14h.01"/><path d="M17 18h.01"/></svg>',
        duration: '7天',
        difficulty: '简单',
        steps: ['三餐完整记录', '避免空腹过久', '固定用餐时间'],
        reminder: '定时提醒',
        benefit: '让饮食规律开始稳定下来。',
        protocol: '我已阅读并理解该7天计划的执行要求。我承诺在计划期间坚持每日打卡，记录饮食情况。我理解本计划旨在帮助我养成良好的饮食习惯，但不能替代专业医学建议。如有任何健康问题，我会咨询专业医生。'
      },
      '14day': {
        name: '14天平衡计划',
        description: '在忙碌与健康之间找到更好的平衡，兼顾工作学习强度。',
        icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m16 16 3-8 3 8c-.87.65-1.92 1-3 1s-2.13-.35-3-1Z"/><path d="m2 16 3-8 3 8c-.87.65-1.92 1-3 1s-2.13-.35-3-1Z"/><path d="M7 21h10"/><path d="M12 3v18"/><path d="M3 7h2c2 0 5-1 7-2 2 1 5 2 7 2h2"/></svg>',
        duration: '14天',
        difficulty: '中等',
        steps: ['合理加餐', '记录饮食心情', '每周总结'],
        reminder: '智能提醒',
        benefit: '建立更适合自己的饮食节律。',
        protocol: '我已阅读并理解该14天计划的执行要求。我承诺在计划期间坚持每日打卡，记录饮食情况。我理解本计划旨在帮助我养成良好的饮食习惯，但不能替代专业医学建议。如有任何健康问题，我会咨询专业医生。'
      },
      '21day': {
        name: '21天蜕变计划',
        description: '面向长期习惯重建，强调持续性与自我管理能力。',
        icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 14.66v1.626a2 2 0 0 1-.976 1.696A5 5 0 0 0 7 21.978"/><path d="M14 14.66v1.626a2 2 0 0 0 .976 1.696A5 5 0 0 1 17 21.978"/><path d="M18 9h1.5a1 1 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M6 9a6 6 0 0 0 12 0V3a1 1 0 0 0-1-1H7a1 1 0 0 0-1 1z"/><path d="M6 9H4.5a1 1 0 0 1 0-5H6"/></svg>',
        duration: '21天',
        difficulty: '困难',
        steps: ['精准计划执行', '每周复盘', '营养分析'],
        reminder: '个性化提醒',
        benefit: '帮助用户形成更稳固的饮食惯性。',
        protocol: '我已阅读并理解该21天计划的执行要求。我承诺在计划期间坚持每日打卡，记录饮食情况。我理解本计划旨在帮助我养成良好的饮食习惯，但不能替代专业医学建议。如有任何健康问题，我会咨询专业医生。'
      }
    };

    // 获取选中的计划（从 localStorage）
    let selectedPlan = localStorage.getItem('selectedPlan');
    // 如果没有选中的计划，默认显示3天计划（或提示错误）
    if (!selectedPlan || !plansData[selectedPlan]) {
      selectedPlan = '3day';
    }

    const plan = plansData[selectedPlan];
    const mainEl = document.getElementById('mainContent');
    const confirmBtn = document.getElementById('confirmBtn');
    const backToSelectBtn = document.getElementById('backToSelectBtn');
    const backBtn = document.getElementById('backBtn');

    let isAgreed = false;

    // 渲染页面内容
    function renderPlan() {
      const stepsHtml = plan.steps.map((step, idx) => `
        <div class="step-item">
          <div class="step-num">${idx+1}</div>
          <div style="flex:1;">${step}</div>
        </div>
      `).join('');

      const html = `
        <div class="detail-card">
          <div class="plan-header">
            <div class="plan-icon">${plan.icon}</div>
            <div class="plan-title">
              <h1>${plan.name}</h1>
              <p>${plan.description}</p>
              <div class="badge-group">
                <span class="badge"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 2v4"/><path d="M16 2v4"/><rect width="18" height="18" x="3" y="4" rx="2"/><path d="M3 10h18"/></svg> ${plan.duration}</span>
                <span class="badge">${plan.difficulty}</span>
              </div>
            </div>
          </div>
        </div>

        <div class="detail-card">
          <div class="section-title">执行重点</div>
          <div class="step-list">${stepsHtml}</div>
        </div>

        <div class="info-grid">
          <div class="info-box">
            <div class="info-label"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.268 21a2 2 0 0 0 3.464 0"/><path d="M3.262 15.326A1 1 0 0 0 4 17h16a1 1 0 0 0 .74-1.673C19.41 13.956 18 12.499 18 8A6 6 0 0 0 6 8c0 4.499-1.411 5.956-2.738 7.326"/></svg> 提醒方式</div>
            <div class="info-value">${plan.reminder}</div>
          </div>
          <div class="info-box">
            <div class="info-label"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg> 预期收益</div>
            <div class="info-value">${plan.benefit}</div>
          </div>
        </div>

        <div class="detail-card">
          <div class="section-title">计划协议</div>
          <div class="protocol-box">${plan.protocol}</div>
          <div class="checkbox-item">
            <input type="checkbox" id="agreeCheckbox">
            <label for="agreeCheckbox">我已阅读并同意上述计划协议</label>
          </div>
        </div>
      `;
      mainEl.innerHTML = html;

      // 绑定复选框事件
      const checkbox = document.getElementById('agreeCheckbox');
      if (checkbox) {
        checkbox.addEventListener('change', (e) => {
          isAgreed = e.target.checked;
          if (isAgreed) {
            confirmBtn.disabled = false;
            confirmBtn.classList.add('active');
          } else {
            confirmBtn.disabled = true;
            confirmBtn.classList.remove('active');
          }
        });
      }
    }

    renderPlan();

    // 确认按钮：保存计划开始标记，跳转到饮食管理首页
    confirmBtn.addEventListener('click', () => {
      if (!isAgreed) return;
      // 保存已确认的计划开始状态（可选）
      localStorage.setItem('planStarted', 'true');
      localStorage.setItem('planStartDate', new Date().toISOString());
      // 跳转到饮食管理首页（请确保文件名存在）
      window.location.href = '饮食管理首页.html';
    });

    // 返回选择页
    backToSelectBtn.addEventListener('click', () => {
      window.location.href = '饮食计划选择页.html';
    });

    // 左上角返回（同返回选择）
    backBtn.addEventListener('click', () => {
      window.location.href = '饮食计划选择页.html';
    });
  </script>
</body>
</html>
