<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>计划详情 - 吃了么</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #fef9e8;
      font-family: -apple-system, "PingFang SC", "Noto Sans SC", system-ui, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem;
      background: #fff9f0;
      border-bottom: 1px solid #f0e4d4;
    }
    .back-btn {
      width: 2rem;
      height: 2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      border-radius: 50%;
    }
    .back-btn:hover { background: #f0e4d4; }
    .title { font-size: 1.1rem; font-weight: 600; color: #5a3e2b; }
    .main { flex: 1; overflow-y: auto; padding: 1rem; }
    .card {
      background: white;
      border-radius: 1rem;
      border: 1px solid #f0e4d4;
      padding: 1rem;
      margin-bottom: 1rem;
    }
    .plan-header { display: flex; gap: 1rem; align-items: center; margin-bottom: 1rem; }
    .plan-icon { width: 4rem; height: 4rem; background: #fdf3e8; border-radius: 1rem; display: flex; align-items: center; justify-content: center; }
    .plan-icon svg { width: 2rem; height: 2rem; stroke: #e67e22; stroke-width: 1.8; }
    .plan-title h1 { font-size: 1.3rem; font-weight: 700; color: #5a3e2b; }
    .plan-title p { font-size: 0.8rem; color: #a07a5c; }
    .badge-group { display: flex; gap: 0.5rem; margin-top: 0.5rem; }
    .badge { background: #fdf3e8; padding: 0.2rem 0.6rem; border-radius: 20px; font-size: 0.7rem; color: #e67e22; }
    .section-title { font-size: 1rem; font-weight: 600; color: #5a3e2b; margin: 1rem 0 0.5rem; }
    .step-list { display: flex; flex-direction: column; gap: 0.5rem; }
    .step-item { display: flex; gap: 0.5rem; align-items: center; background: #fffbf5; padding: 0.5rem; border-radius: 0.75rem; }
    .step-num { width: 1.5rem; height: 1.5rem; background: #fdf3e8; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; font-weight: bold; color: #e67e22; }
    .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; margin: 0.5rem 0; }
    .info-box { background: #fffbf5; padding: 0.5rem; border-radius: 0.75rem; text-align: center; }
    .protocol-box { background: #fef5ea; padding: 0.75rem; border-radius: 0.75rem; font-size: 0.7rem; line-height: 1.5; margin: 0.5rem 0; max-height: 100px; overflow-y: auto; }
    .checkbox-item { display: flex; gap: 0.5rem; align-items: center; margin: 1rem 0; }
    .checkbox-item input { width: 1.2rem; height: 1.2rem; accent-color: #e67e22; }
    .btn-primary { width: 100%; background: #d9c8b8; border: none; border-radius: 2rem; padding: 0.8rem; font-weight: 600; color: white; cursor: not-allowed; transition: all 0.2s; margin-top: 0.5rem; }
    .btn-primary.active { background: #e67e22; cursor: pointer; }
    .btn-secondary { width: 100%; background: transparent; border: 1px solid #e2d4c8; border-radius: 2rem; padding: 0.8rem; font-weight: 600; color: #a07a5c; cursor: pointer; margin-top: 0.5rem; }
  </style>
  <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore-compat.js"></script>
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyCVdUzsAMepg1knrDg4ID7tM3xb_0ILyPM",
      authDomain: "beatricesaturn-6ff7e.firebaseapp.com",
      projectId: "beatricesaturn-6ff7e",
      storageBucket: "beatricesaturn-6ff7e.firebasestorage.app",
      messagingSenderId: "607338984635",
      appId: "1:607338984635:web:a4b3668715462a4d0ca59e",
      measurementId: "G-L2R10QZZL9"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    let currentUser = null;
    let selectedPlan = null;
    let planDetails = null;

    auth.onAuthStateChanged(user => {
      if (user) {
        currentUser = user;
        loadPlan();
      } else {
        window.location.href = 'index.html';
      }
    });

    async function loadPlan() {
      const doc = await db.collection('plans').doc(currentUser.uid).get();
      if (doc.exists && doc.data().selectedPlan) {
        selectedPlan = doc.data().selectedPlan;
      } else {
        // 没有计划，跳转回选择页
        window.location.href = '饮食计划选择页.html';
        return;
      }
      renderPlanDetails();
    }

    function renderPlanDetails() {
      const plansData = {
        '3day': { name: '3天体验计划', desc: '用最轻量的方式重建三餐感知，适合刚开始想调整节奏的用户。', duration: '3天', difficulty: '简单', steps: ['固定早餐时间', '午餐不拖延', '晚餐不过晚'], reminder: '温柔提醒', benefit: '快速建立“先吃饭再忙”的基础习惯。', protocol: '我已阅读并理解该3天计划的执行要求。我承诺在计划期间坚持每日打卡，记录饮食情况。' },
        '7day': { name: '7天巩固计划', desc: '通过一周连续打卡，让规律吃饭形成可感知的节奏。', duration: '7天', difficulty: '简单', steps: ['三餐完整记录', '避免空腹过久', '固定用餐时间'], reminder: '定时提醒', benefit: '让饮食规律开始稳定下来。', protocol: '我已阅读并理解该7天计划的执行要求。我承诺在计划期间坚持每日打卡，记录饮食情况。' },
        '14day': { name: '14天平衡计划', desc: '在忙碌与健康之间找到更好的平衡，兼顾工作学习强度。', duration: '14天', difficulty: '中等', steps: ['合理加餐', '记录饮食心情', '每周总结'], reminder: '智能提醒', benefit: '建立更适合自己的饮食节律。', protocol: '我已阅读并理解该14天计划的执行要求。我承诺在计划期间坚持每日打卡，记录饮食情况。' },
        '21day': { name: '21天蜕变计划', desc: '面向长期习惯重建，强调持续性与自我管理能力。', duration: '21天', difficulty: '困难', steps: ['精准计划执行', '每周复盘', '营养分析'], reminder: '个性化提醒', benefit: '帮助用户形成更稳固的饮食惯性。', protocol: '我已阅读并理解该21天计划的执行要求。我承诺在计划期间坚持每日打卡，记录饮食情况。' }
      };
      planDetails = plansData[selectedPlan];

      const stepsHtml = planDetails.steps.map((step, idx) => `
        <div class="step-item">
          <div class="step-num">${idx+1}</div>
          <div>${step}</div>
        </div>
      `).join('');

      const html = `
        <div class="card">
          <div class="plan-header">
            <div class="plan-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4"/><path d="M3 10h18"/><path d="M8 2v4"/><path d="M17 14h-6"/><path d="M13 18H7"/><path d="M7 14h.01"/><path d="M17 18h.01"/></svg></div>
            <div class="plan-title">
              <h1>${planDetails.name}</h1>
              <p>${planDetails.desc}</p>
              <div class="badge-group"><span class="badge">${planDetails.duration}</span><span class="badge">${planDetails.difficulty}</span></div>
            </div>
          </div>
        </div>

        <div class="card">
          <div class="section-title">执行重点</div>
          <div class="step-list">${stepsHtml}</div>
        </div>

        <div class="info-grid">
          <div class="info-box"><div class="info-label">提醒方式</div><div>${planDetails.reminder}</div></div>
          <div class="info-box"><div class="info-label">预期收益</div><div>${planDetails.benefit}</div></div>
        </div>

        <div class="card">
          <div class="section-title">计划协议</div>
          <div class="protocol-box">${planDetails.protocol}</div>
          <div class="checkbox-item">
            <input type="checkbox" id="agreeCheckbox">
            <label for="agreeCheckbox">我已阅读并同意上述计划协议</label>
          </div>
        </div>

        <button class="btn-primary" id="confirmBtn" disabled>确认协议并开始执行</button>
        <button class="btn-secondary" id="backToSelectBtn">返回选择</button>
      `;

      document.getElementById('mainContent').innerHTML = html;

      const checkbox = document.getElementById('agreeCheckbox');
      const confirmBtn = document.getElementById('confirmBtn');
      checkbox.addEventListener('change', (e) => {
        if (e.target.checked) {
          confirmBtn.classList.add('active');
          confirmBtn.disabled = false;
        } else {
          confirmBtn.classList.remove('active');
          confirmBtn.disabled = true;
        }
      });
      confirmBtn.addEventListener('click', async () => {
        if (!checkbox.checked) return;
        await db.collection('plans').doc(currentUser.uid).set({
          planStarted: true,
          planStartDate: new Date().toISOString()
        }, { merge: true });
        window.location.href = '饮食管理首页.html';
      });
      document.getElementById('backToSelectBtn').addEventListener('click', () => {
        window.location.href = '饮食计划选择页.html';
      });
    }

    document.getElementById('backBtn').addEventListener('click', () => {
      window.location.href = '饮食计划选择页.html';
    });
  </script>
</head>
<body>
  <div class="header">
    <div class="back-btn" id="backBtn">←</div>
    <div class="title">计划详情</div>
    <div style="width:2rem;"></div>
  </div>
  <div class="main" id="mainContent">
    <div style="text-align: center; padding: 2rem;">加载中...</div>
  </div>
</body>
</html>
