<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>我的计划进度 - 吃了么</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #fef9e8;
      font-family: -apple-system, "PingFang SC", "Noto Sans SC", system-ui, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem;
      background: #fff9f0;
      border-bottom: 1px solid #f0e4d4;
    }
    .back-btn {
      width: 2rem;
      height: 2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      border-radius: 50%;
    }
    .back-btn:hover { background: #f0e4d4; }
    .title { font-size: 1.1rem; font-weight: 600; color: #5a3e2b; }
    .main { flex: 1; overflow-y: auto; padding: 1rem; }
    .card {
      background: white;
      border-radius: 1rem;
      border: 1px solid #f0e4d4;
      padding: 1rem;
      margin-bottom: 1rem;
    }
    .plan-name { font-size: 1.2rem; font-weight: 700; color: #5a3e2b; margin-bottom: 0.25rem; }
    .plan-days { font-size: 0.8rem; color: #a07a5c; margin-bottom: 1rem; }
    .progress-section { margin-bottom: 1rem; }
    .progress-label { display: flex; justify-content: space-between; font-size: 0.8rem; margin-bottom: 0.25rem; }
    .progress-bar { background: #f0e4d4; border-radius: 1rem; height: 0.6rem; overflow: hidden; }
    .progress-fill { background: linear-gradient(90deg, #e67e22, #f0a55a); width: 0%; height: 100%; border-radius: 1rem; transition: width 0.3s; }
    .stats { display: flex; justify-content: space-between; background: #fffbf5; border-radius: 1rem; padding: 0.75rem; margin-bottom: 1rem; }
    .stat-item { text-align: center; flex: 1; }
    .stat-value { font-size: 1.2rem; font-weight: 700; color: #e67e22; }
    .stat-label { font-size: 0.7rem; color: #a07a5c; }
    .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 0.5rem; margin: 1rem 0; }
    .day-cell { aspect-ratio: 1; background: #fffbf5; border-radius: 0.75rem; display: flex; flex-direction: column; align-items: center; justify-content: center; border: 1px solid #f0e4d4; font-size: 0.7rem; }
    .day-cell.checked { background: #fdf3e8; border-color: #e67e22; color: #e67e22; font-weight: 600; }
    .day-cell.today { border: 2px solid #e67e22; background: #fff7f0; }
    .encouragement { background: #fff7f0; border-radius: 1rem; padding: 1rem; text-align: center; font-size: 0.85rem; border-left: 4px solid #e67e22; }
    .btn-primary { width: 100%; background: #e67e22; border: none; border-radius: 2rem; padding: 0.8rem; font-weight: 600; color: white; cursor: pointer; margin-top: 0.5rem; }
  </style>
  <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore-compat.js"></script>
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyCVdUzsAMepg1knrDg4ID7tM3xb_0ILyPM",
      authDomain: "beatricesaturn-6ff7e.firebaseapp.com",
      projectId: "beatricesaturn-6ff7e",
      storageBucket: "beatricesaturn-6ff7e.firebasestorage.app",
      messagingSenderId: "607338984635",
      appId: "1:607338984635:web:a4b3668715462a4d0ca59e",
      measurementId: "G-L2R10QZZL9"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    let currentUser = null;
    let selectedPlan = null;
    let totalDays = 0;
    let completedDays = 0;
    let checkinsMap = {};

    auth.onAuthStateChanged(user => {
      if (user) {
        currentUser = user;
        loadData();
      } else {
        window.location.href = 'index.html';
      }
    });

    async function loadData() {
      // 获取用户选择的计划
      const planDoc = await db.collection('plans').doc(currentUser.uid).get();
      if (!planDoc.exists || !planDoc.data().selectedPlan) {
        window.location.href = '饮食计划选择页.html';
        return;
      }
      selectedPlan = planDoc.data().selectedPlan;
      const planMap = { '3day': 3, '7day': 7, '14day': 14, '21day': 21 };
      totalDays = planMap[selectedPlan] || 7;

      // 获取用户的打卡记录
      const checkinsSnap = await db.collection('checkins')
        .where('__name__', '>=', `${currentUser.uid}_`)
        .get();
      checkinsSnap.forEach(doc => {
        const date = doc.id.split('_')[1];
        const data = doc.data();
        if (data.breakfast || data.lunch || data.dinner) {
          checkinsMap[date] = true;
        }
      });
      completedDays = Object.keys(checkinsMap).length;

      renderPage();
    }

    function renderPage() {
      const planNameMap = { '3day': '3天体验计划', '7day': '7天巩固计划', '14day': '14天平衡计划', '21day': '21天蜕变计划' };
      const planName = planNameMap[selectedPlan] || '计划';
      const percent = totalDays > 0 ? Math.round((completedDays / totalDays) * 100) : 0;

      // 生成最近 totalDays 天的日历
      const today = new Date();
      const dates = [];
      for (let i = totalDays - 1; i >= 0; i--) {
        const d = new Date(today);
        d.setDate(today.getDate() - i);
        const dateStr = d.toISOString().slice(0,10);
        const isChecked = checkinsMap[dateStr] === true;
        const isToday = i === totalDays - 1; // 最后一天是今天
        dates.push({ dateStr, dayIndex: i+1, isChecked, isToday });
      }
      const calendarHtml = dates.map(d => `
        <div class="day-cell ${d.isChecked ? 'checked' : ''} ${d.isToday ? 'today' : ''}">
          <div>第${d.dayIndex}天</div>
          <div>${d.isChecked ? '✓' : '○'}</div>
        </div>
      `).join('');

      const encouragement = (() => {
        if (completedDays === 0) return "🚀 开始你的计划吧！今天就是改变的第一步。";
        if (percent < 30) return "💪 好的开始是成功的一半，继续坚持！";
        if (percent < 70) return `🌟 你已经坚持了 ${completedDays} 天，离目标越来越近了！`;
        if (percent < 100) return "🎉 太棒了！再坚持一下，胜利在望！";
        return "🏆 恭喜你完成了全部计划！你已成为习惯的主人！";
      })();

      const html = `
        <div class="card">
          <div class="plan-name">${planName}</div>
          <div class="plan-days">总天数 ${totalDays} 天</div>
          <div class="progress-section">
            <div class="progress-label"><span>完成进度</span><span>${percent}%</span></div>
            <div class="progress-bar"><div class="progress-fill" style="width:${percent}%;"></div></div>
          </div>
          <div class="stats">
            <div class="stat-item"><div class="stat-value">${completedDays}</div><div class="stat-label">已坚持天数</div></div>
            <div class="stat-item"><div class="stat-value">${totalDays - completedDays}</div><div class="stat-label">剩余天数</div></div>
            <div class="stat-item"><div class="stat-value">${percent}%</div><div class="stat-label">完成率</div></div>
          </div>
        </div>

        <div class="card">
          <div style="font-weight:600; margin-bottom:0.5rem;">📅 每日打卡日历</div>
          <div class="calendar-grid">${calendarHtml}</div>
        </div>

        <div class="encouragement">${encouragement}</div>

        <button class="btn-primary" id="backToPlanBtn">返回计划详情</button>
      `;

      document.getElementById('mainContent').innerHTML = html;
      document.getElementById('backToPlanBtn').addEventListener('click', () => {
        window.location.href = '计划详情页.html';
      });
    }

    document.getElementById('backBtn').addEventListener('click', () => {
      window.location.href = '计划详情页.html';
    });
  </script>
</head>
<body>
  <div class="header">
    <div class="back-btn" id="backBtn">←</div>
    <div class="title">我的计划进度</div>
    <div style="width:2rem;"></div>
  </div>
  <div class="main" id="mainContent">
    <div style="text-align: center; padding: 2rem;">加载中...</div>
  </div>
</body>
</html>
