<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>亲友共享空间 - 吃了么</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #fef9e8;
      font-family: -apple-system, "PingFang SC", "Noto Sans SC", system-ui, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem;
      background: #fff9f0;
      border-bottom: 1px solid #f0e4d4;
    }
    .back-btn {
      width: 2rem;
      height: 2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      border-radius: 50%;
    }
    .back-btn:hover { background: #f0e4d4; }
    .title { font-size: 1.1rem; font-weight: 600; color: #5a3e2b; }
    .main { flex: 1; overflow-y: auto; padding: 1rem; }
    .card {
      background: white;
      border-radius: 1rem;
      border: 1px solid #f0e4d4;
      padding: 1rem;
      margin-bottom: 1rem;
    }
    .friend-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.75rem;
      background: #fffbf5;
      border-radius: 0.75rem;
      margin-bottom: 0.5rem;
    }
    .friend-avatar {
      width: 2.5rem;
      height: 2.5rem;
      background: #fdf3e8;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      color: #e67e22;
    }
    .friend-info { flex: 1; }
    .friend-name { font-weight: 600; color: #5a3e2b; }
    .friend-email { font-size: 0.7rem; color: #a07a5c; }
    .friend-status { display: flex; gap: 0.5rem; margin-top: 0.25rem; }
    .status-icon { width: 1.2rem; text-align: center; font-size: 0.8rem; }
    .status-icon.checked { color: #e67e22; }
    .action-buttons {
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
    }
    .action-btn {
      background: #fef5ea;
      border: 1px solid #f0e4d4;
      border-radius: 1.5rem;
      padding: 0.2rem 0.6rem;
      font-size: 0.7rem;
      cursor: pointer;
      text-align: center;
    }
    .add-friend-btn {
      background: #e67e22;
      color: white;
      border: none;
      padding: 0.4rem 1rem;
      border-radius: 2rem;
      cursor: pointer;
    }
    .search-box {
      display: flex;
      gap: 0.5rem;
      margin-top: 1rem;
    }
    .search-box input {
      flex: 1;
      padding: 0.5rem;
      border: 1px solid #e2d4c8;
      border-radius: 2rem;
    }
    .empty-state { text-align: center; padding: 2rem; color: #c0a080; }
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #fff9f0;
      border-top: 1px solid #f0e4d4;
      display: flex;
      justify-content: space-around;
      padding: 0.5rem 1rem 1rem;
      z-index: 10;
    }
    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.2rem;
      cursor: pointer;
      color: #c0a080;
    }
    .nav-item.active { color: #e67e22; }
    .nav-icon { width: 1.5rem; height: 1.5rem; stroke: currentColor; stroke-width: 2; }
  </style>
  <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore-compat.js"></script>
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyCVdUzsAMepg1knrDg4ID7tM3xb_0ILyPM",
      authDomain: "beatricesaturn-6ff7e.firebaseapp.com",
      projectId: "beatricesaturn-6ff7e",
      storageBucket: "beatricesaturn-6ff7e.firebasestorage.app",
      messagingSenderId: "607338984635",
      appId: "1:607338984635:web:a4b3668715462a4d0ca59e",
      measurementId: "G-L2R10QZZL9"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    let currentUser = null;

    auth.onAuthStateChanged(user => {
      if (user) {
        currentUser = user;
        loadFriends();
      } else {
        window.location.href = 'index.html';
      }
    });

    async function loadFriends() {
      const friendships = await db.collection('friendships')
        .where('uid', '==', currentUser.uid)
        .where('status', '==', 'accepted')
        .get();
      const friendIds = friendships.docs.map(doc => doc.data().friendId);
      if (friendIds.length === 0) {
        document.getElementById('friendsList').innerHTML = '<div class="empty-state">暂无亲友，点击上方“添加亲友”添加～</div>';
        return;
      }
      const friends = [];
      for (const fid of friendIds) {
        const profileDoc = await db.collection('profiles').doc(fid).get();
        if (profileDoc.exists) {
          const profile = profileDoc.data();
          const today = new Date().toISOString().slice(0,10);
          const checkinDoc = await db.collection('checkins').doc(`${fid}_${today}`).get();
          const checkin = checkinDoc.exists ? checkinDoc.data() : {};
          const meals = ['breakfast', 'lunch', 'dinner'];
          const statusIcons = meals.map(meal => ({
            meal,
            done: checkin[meal] === true
          }));
          friends.push({
            uid: fid,
            nickname: profile.nickname || fid.slice(0,6),
            email: profile.email || '',
            statusIcons
          });
        }
      }
      renderFriendsList(friends);
    }

    function renderFriendsList(friends) {
      const container = document.getElementById('friendsList');
      const html = friends.map(f => `
        <div class="friend-item" data-uid="${f.uid}">
          <div class="friend-avatar">${f.nickname.charAt(0).toUpperCase()}</div>
          <div class="friend-info">
            <div class="friend-name">${escapeHtml(f.nickname)}</div>
            <div class="friend-email">${escapeHtml(f.email)}</div>
            <div class="friend-status">
              ${f.statusIcons.map(s => `<span class="status-icon ${s.done ? 'checked' : ''}">${s.done ? '✓' : '○'}</span>`).join('')}
            </div>
          </div>
          <div class="action-buttons">
            <button class="action-btn" data-action="chat" data-id="${f.uid}">💬 聊天</button>
            <button class="action-btn" data-action="delete" data-id="${f.uid}">删除</button>
          </div>
        </div>
      `).join('');
      container.innerHTML = html;

      document.querySelectorAll('[data-action="chat"]').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          const friendId = btn.getAttribute('data-id');
          window.location.href = `关怀互动详情页.html?friendId=${friendId}`;
        });
      });
      document.querySelectorAll('[data-action="delete"]').forEach(btn => {
        btn.addEventListener('click', async (e) => {
          e.stopPropagation();
          const friendId = btn.getAttribute('data-id');
          if (confirm('确定要删除这位亲友吗？')) {
            // 删除双向好友关系
            const snap1 = await db.collection('friendships')
              .where('uid', '==', currentUser.uid)
              .where('friendId', '==', friendId)
              .get();
            snap1.forEach(doc => doc.ref.delete());
            const snap2 = await db.collection('friendships')
              .where('uid', '==', friendId)
              .where('friendId', '==', currentUser.uid)
              .get();
            snap2.forEach(doc => doc.ref.delete());
            loadFriends();
          }
        });
      });
    }

    async function searchAndAddFriend() {
      const email = document.getElementById('searchEmail').value.trim();
      if (!email) return;
      const usersSnap = await db.collection('profiles').where('email', '==', email).get();
      if (usersSnap.empty) {
        alert('未找到该用户，请确保对方已注册并填写档案');
        return;
      }
      const targetUser = usersSnap.docs[0];
      const targetUid = targetUser.id;
      if (targetUid === currentUser.uid) {
        alert('不能添加自己为好友');
        return;
      }
      const existing = await db.collection('friendships')
        .where('uid', '==', currentUser.uid)
        .where('friendId', '==', targetUid)
        .get();
      if (!existing.empty) {
        alert('已经是好友了');
        return;
      }
      // 双向添加好友，包含 status 字段
      await db.collection('friendships').add({
        uid: currentUser.uid,
        friendId: targetUid,
        status: 'accepted',
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      });
      await db.collection('friendships').add({
        uid: targetUid,
        friendId: currentUser.uid,
        status: 'accepted',
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      });
      alert('添加成功');
      document.getElementById('searchEmail').value = '';
      loadFriends();
    }

    function escapeHtml(str) { return str.replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }

    let showAddPanel = false;
    document.getElementById('addFriendBtn').addEventListener('click', () => {
      showAddPanel = !showAddPanel;
      document.getElementById('addFriendPanel').style.display = showAddPanel ? 'block' : 'none';
    });
    document.getElementById('confirmAddBtn').addEventListener('click', searchAndAddFriend);
    document.getElementById('cancelAddBtn').addEventListener('click', () => {
      document.getElementById('addFriendPanel').style.display = 'none';
      showAddPanel = false;
    });
    document.getElementById('backBtn').addEventListener('click', () => {
      window.location.href = '饮食管理首页.html';
    });
  </script>
</head>
<body>
  <div class="header">
    <div class="back-btn" id="backBtn">←</div>
    <div class="title">亲友共享空间</div>
    <div style="width:2rem;"></div>
  </div>
  <div class="main">
    <div class="card">
      <div style="display: flex; justify-content: space-between; align-items: center;">
        <h3>我的亲友</h3>
        <button class="add-friend-btn" id="addFriendBtn">+ 添加亲友</button>
      </div>
      <div id="friendsList" class="empty-state">加载中...</div>
      <div id="addFriendPanel" style="display:none; margin-top:1rem;">
        <div class="search-box">
          <input type="email" id="searchEmail" placeholder="输入好友的注册邮箱">
          <button id="confirmAddBtn">搜索并添加</button>
        </div>
        <button id="cancelAddBtn" style="background:transparent; border:none; color:#a07a5c; width:100%;">取消</button>
      </div>
    </div>
  </div>
  <div class="bottom-nav">
    <div class="nav-item" data-nav="home"><svg class="nav-icon" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="9" rx="1"/><rect x="14" y="3" width="7" height="5" rx="1"/><rect x="14" y="12" width="7" height="9" rx="1"/><rect x="3" y="16" width="7" height="5" rx="1"/></svg><span>首页</span></div>
    <div class="nav-item" data-nav="record"><svg class="nav-icon" viewBox="0 0 24 24"><rect x="8" y="2" width="8" height="4" rx="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><path d="M12 11h4"/><path d="M12 16h4"/><path d="M8 11h.01"/><path d="M8 16h.01"/></svg><span>饮食记录</span></div>
    <div class="nav-item active" data-nav="friends"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><path d="M16 3.128a4 4 0 0 1 0 7.744"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><circle cx="9" cy="7" r="4"/></svg><span>亲友空间</span></div>
    <div class="nav-item" data-nav="report"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M3 3v16a2 2 0 0 0 2 2h16"/><path d="M18 17V9"/><path d="M13 17V5"/><path d="M8 17v-3"/></svg><span>报表</span></div>
  </div>
  <script>
    document.querySelectorAll('.nav-item').forEach(nav => {
      nav.addEventListener('click', () => {
        const to = nav.getAttribute('data-nav');
        if (to === 'home') window.location.href = '饮食管理首页.html';
        else if (to === 'record') window.location.href = '打卡详情页.html';
        else if (to === 'friends') window.location.href = '亲友共享空间主页.html';
        else if (to === 'report') window.location.href = '饮食趋势报表.html';
      });
    });
  </script>
</body>
</html>
