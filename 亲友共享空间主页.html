<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>亲友共享空间 - 吃了么</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #fef9e8;
      font-family: -apple-system, "PingFang SC", "Noto Sans SC", system-ui, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    /* 头部 */
    .header {
      position: sticky;
      top: 0;
      z-index: 50;
      width: 100%;
      background: #fff9f0;
      border-bottom: 1px solid #f0e4d4;
      padding: 0 1rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 56px;
    }
    .back-btn {
      width: 2.5rem;
      height: 2.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 0.5rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    .back-btn:hover { background: #f0e4d4; }
    .back-btn svg { width: 1.5rem; height: 1.5rem; stroke: #5a3e2b; stroke-width: 2.5; }
    .title {
      flex: 1;
      text-align: center;
      font-size: 1rem;
      font-weight: 600;
      color: #5a3e2b;
    }
    /* 主内容滚动区 */
    .main-content {
      flex: 1;
      overflow-y: auto;
      padding: 1rem;
      padding-bottom: 80px;
      scrollbar-width: thin;
    }
    /* 顶部标题区 */
    .hero {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 1.5rem;
    }
    .hero-text h2 {
      font-size: 1.5rem;
      font-weight: 800;
      color: #5a3e2b;
      letter-spacing: -0.5px;
    }
    .hero-text p {
      font-size: 0.7rem;
      color: #c0a080;
      display: flex;
      align-items: center;
      gap: 0.25rem;
      margin-top: 0.25rem;
    }
    .add-friend-btn {
      width: 2.75rem;
      height: 2.75rem;
      background: white;
      border-radius: 1.25rem;
      border: 2px solid white;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
    }
    .add-friend-btn:active { transform: scale(0.94); background: #fff7f0; }
    .add-friend-btn svg { width: 1.5rem; height: 1.5rem; stroke: #e67e22; stroke-width: 2.5; }
    /* 亲友卡片 */
    .friend-card {
      background: rgba(255,255,240,0.8);
      backdrop-filter: blur(4px);
      border: 2px solid rgba(255,255,255,0.6);
      border-radius: 2rem;
      padding: 1rem;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      box-shadow: 0 8px 30px rgba(0,0,0,0.02);
      transition: all 0.2s;
      cursor: pointer;
    }
    .friend-card:active { transform: scale(0.98); background: #fff7f0; }
    .avatar {
      position: relative;
      flex-shrink: 0;
    }
    .avatar-bg {
      width: 4rem;
      height: 4rem;
      border-radius: 1.5rem;
      background: linear-gradient(135deg, #fce4d6, #ffd9b5);
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px solid white;
      box-shadow: inset 0 1px 2px rgba(0,0,0,0.02);
    }
    .avatar-bg svg { width: 2rem; height: 2rem; stroke: #e67e22; stroke-width: 2; }
    .status-dot {
      position: absolute;
      bottom: -0.25rem;
      right: -0.25rem;
      width: 1.5rem;
      height: 1.5rem;
      border-radius: 50%;
      border: 3px solid white;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #e67e22;
    }
    .status-dot svg { width: 0.8rem; height: 0.8rem; stroke: white; stroke-width: 3; }
    .friend-info {
      flex: 1;
    }
    .friend-name-row {
      display: flex;
      align-items: baseline;
      gap: 0.5rem;
      margin-bottom: 0.25rem;
    }
    .friend-name {
      font-size: 1.1rem;
      font-weight: 700;
      color: #5a3e2b;
    }
    .friend-tag {
      font-size: 0.6rem;
      padding: 0.2rem 0.5rem;
      border-radius: 20px;
      font-weight: 600;
      background: #fee2e2;
      color: #e67e22;
    }
    .friend-quote {
      font-size: 0.7rem;
      color: #a07a5c;
      margin-bottom: 0.5rem;
      display: flex;
      gap: 0.25rem;
      align-items: flex-start;
    }
    .friend-status {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: rgba(255,255,255,0.5);
      border-radius: 30px;
      padding: 0.2rem 0.75rem;
      font-size: 0.7rem;
      font-weight: 600;
    }
    .action-buttons {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 0.5rem;
    }
    .action-btn {
      padding: 0.4rem 0.8rem;
      border-radius: 1rem;
      background: #fef5ea;
      border: 1px solid white;
      font-size: 0.7rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 0.3rem;
      cursor: pointer;
      transition: all 0.2s;
      color: #e67e22;
    }
    .action-btn:active { transform: scale(0.92); background: #fff0e0; }
    .action-btn svg { width: 1rem; height: 1rem; stroke: currentColor; stroke-width: 2.5; }
    .arrow-icon {
      color: #d9c8b8;
      margin-top: 0.25rem;
    }
    /* 空状态 */
    .empty-state {
      text-align: center;
      padding: 3rem 1rem;
      color: #c0a080;
    }
    /* 底部导航栏 */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #fff9f0;
      border-top: 1px solid #f0e4d4;
      display: flex;
      justify-content: space-around;
      padding: 0.5rem 1rem 1rem;
      z-index: 20;
    }
    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.2rem;
      cursor: pointer;
      color: #c0a080;
      transition: color 0.2s;
    }
    .nav-item.active { color: #e67e22; }
    .nav-icon { width: 1.5rem; height: 1.5rem; stroke: currentColor; stroke-width: 2; }
    .nav-label { font-size: 0.7rem; font-weight: 500; }
  </style>
</head>
<body>
  <header class="header">
    <div class="back-btn" id="backBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M15 18l-6-6 6-6" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <div class="title">亲友共享空间</div>
    <div class="right-placeholder" style="width:2.5rem;"></div>
  </header>

  <main class="main-content" id="mainContent">
    <!-- 动态渲染亲友列表 -->
    <div id="friendsList"></div>
  </main>

  <div class="bottom-nav">
    <div class="nav-item" data-nav="home">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="3" width="7" height="9" rx="1"/><rect x="14" y="3" width="7" height="5" rx="1"/>
        <rect x="14" y="12" width="7" height="9" rx="1"/><rect x="3" y="16" width="7" height="5" rx="1"/>
      </svg>
      <span class="nav-label">首页</span>
    </div>
    <div class="nav-item" data-nav="record">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="8" y="2" width="8" height="4" rx="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><path d="M12 11h4"/><path d="M12 16h4"/><path d="M8 11h.01"/><path d="M8 16h.01"/>
      </svg>
      <span class="nav-label">饮食记录</span>
    </div>
    <div class="nav-item active" data-nav="friends">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><path d="M16 3.128a4 4 0 0 1 0 7.744"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><circle cx="9" cy="7" r="4"/>
      </svg>
      <span class="nav-label">亲友空间</span>
    </div>
    <div class="nav-item" data-nav="report">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M3 3v16a2 2 0 0 0 2 2h16"/><path d="M18 17V9"/><path d="M13 17V5"/><path d="M8 17v-3"/>
      </svg>
      <span class="nav-label">报表</span>
    </div>
  </div>

  <script>
    // ---------- 数据模型 ----------
    // 默认亲友数据
    const defaultFriends = [
      {
        id: '1',
        name: '爸爸',
        relation: '家人',
        quote: '再忙也要记得补充能量呀！',
        status: 'checked', // checked, busy, online
        statusText: '已按时吃饭',
        statusColor: 'emerald',
        actionType: 'flower',
        actionLabel: '送朵花',
        actionIcon: 'flower'
      },
      {
        id: '2',
        name: '同学',
        relation: '朋友',
        quote: '干饭人，干饭魂，吃饭才有精气神！',
        status: 'busy',
        statusText: '正在忙碌中',
        statusColor: 'amber',
        actionType: 'remind',
        actionLabel: '催吃饭',
        actionIcon: 'bell'
      },
      {
        id: '3',
        name: '女儿',
        relation: '家人',
        quote: '按时吃饭，照顾好自己喔~',
        status: 'online',
        statusText: '在线',
        statusColor: 'sky',
        actionType: 'greet',
        actionLabel: '打招呼',
        actionIcon: 'hand'
      }
    ];

    // 获取亲友列表
    function getFriends() {
      const stored = localStorage.getItem('friendsList');
      if (stored) {
        try {
          return JSON.parse(stored);
        } catch(e) {}
      }
      return defaultFriends;
    }

    // 保存亲友列表
    function saveFriends(friends) {
      localStorage.setItem('friendsList', JSON.stringify(friends));
    }

    // 添加亲友（模拟）
    function addFriend() {
      const name = prompt('请输入亲友昵称：');
      if (!name) return;
      const relation = prompt('关系（例如：家人、朋友、同事）：', '朋友');
      const newFriend = {
        id: Date.now().toString(),
        name: name,
        relation: relation || '朋友',
        quote: '一起好好吃饭！',
        status: 'online',
        statusText: '在线',
        statusColor: 'sky',
        actionType: 'greet',
        actionLabel: '打招呼',
        actionIcon: 'hand'
      };
      const friends = getFriends();
      friends.push(newFriend);
      saveFriends(friends);
      renderFriendsList();
      alert(`已添加 ${name} 到亲友空间`);
    }

    // 互动动作
    function interact(friendId, actionType) {
      const friend = getFriends().find(f => f.id === friendId);
      if (!friend) return;
      let msg = '';
      if (actionType === 'flower') msg = `🌸 你送了一朵花给 ${friend.name}，ta会感受到你的关心~`;
      else if (actionType === 'remind') msg = `⏰ 已提醒 ${friend.name} 记得吃饭！`;
      else if (actionType === 'greet') msg = `👋 向 ${friend.name} 打了个招呼！`;
      alert(msg);
      // 可以记录互动日志到 localStorage，此处简化
    }

    // 渲染亲友列表
    function renderFriendsList() {
      const friends = getFriends();
      const container = document.getElementById('friendsList');
      if (!friends.length) {
        container.innerHTML = `
          <div class="empty-state">
            <p>还没有亲友，点击右上角 + 添加</p>
          </div>
        `;
        return;
      }

      const heroHtml = `
        <div class="hero">
          <div class="hero-text">
            <h2>我的亲友</h2>
            <p><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#e67e22" stroke-width="2"><path d="M2 9.5a5.5 5.5 0 0 1 9.591-3.676.56.56 0 0 0 .818 0A5.49 5.49 0 0 1 22 9.5c0 2.29-1.5 4-3 5.5l-5.492 5.313a2 2 0 0 1-3 .019L5 15c-1.5-1.5-3-3.2-3-5.5"/></svg> 唯有爱和美食不可辜负</p>
          </div>
          <div class="add-friend-btn" id="addFriendBtn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M5 12h14M12 5v14"/></svg>
          </div>
        </div>
      `;

      const cardsHtml = friends.map(friend => {
        // 根据 statusColor 设置颜色类（用于小圆点和标签）
        const colorMap = {
          emerald: '#10b981',
          amber: '#f59e0b',
          sky: '#0ea5e9'
        };
        const dotColor = colorMap[friend.statusColor] || '#e67e22';
        // 状态图标
        let statusIcon = '';
        if (friend.status === 'checked') statusIcon = '<svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="4"><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></svg>';
        else if (friend.status === 'busy') statusIcon = '<svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="4"><path d="M12 6v6l4 2"/><circle cx="12" cy="12" r="10"/></svg>';
        else statusIcon = '<svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="4"><circle cx="12" cy="12" r="10"/></svg>';
        
        // 动作按钮图标
        let actionSvg = '';
        if (friend.actionIcon === 'flower') actionSvg = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5a3 3 0 1 1 3 3m-3-3a3 3 0 1 0-3 3m3-3v1M9 8a3 3 0 1 0 3 3M9 8h1m5 0a3 3 0 1 1-3 3m3-3h-1m-2 3v-1"/><circle cx="12" cy="8" r="2"/><path d="M12 10v12"/><path d="M12 22c4.2 0 7-1.667 7-5-4.2 0-7 1.667-7 5Z"/><path d="M12 22c-4.2 0-7-1.667-7-5 4.2 0 7 1.667 7 5Z"/></svg>';
        else if (friend.actionIcon === 'bell') actionSvg = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M10.268 21a2 2 0 0 0 3.464 0"/><path d="M22 8c0-2.3-.8-4.3-2-6"/><path d="M3.262 15.326A1 1 0 0 0 4 17h16a1 1 0 0 0 .74-1.673C19.41 13.956 18 12.499 18 8A6 6 0 0 0 6 8c0 4.499-1.411 5.956-2.738 7.326"/><path d="M4 2C2.8 3.7 2 5.7 2 8"/></svg>';
        else actionSvg = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 11V6a2 2 0 0 0-2-2a2 2 0 0 0-2 2"/><path d="M14 10V4a2 2 0 0 0-2-2a2 2 0 0 0-2 2v2"/><path d="M10 10.5V6a2 2 0 0 0-2-2a2 2 0 0 0-2 2v8"/><path d="M18 8a2 2 0 1 1 4 0v6a8 8 0 0 1-8 8h-2c-2.8 0-4.5-.86-5.99-2.34l-3.6-3.6a2 2 0 0 1 2.83-2.82L7 15"/></svg>';
        
        return `
          <div class="friend-card" data-id="${friend.id}">
            <div class="avatar">
              <div class="avatar-bg">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
              </div>
              <div class="status-dot" style="background:${dotColor};">${statusIcon}</div>
            </div>
            <div class="friend-info">
              <div class="friend-name-row">
                <span class="friend-name">${friend.name}</span>
                <span class="friend-tag">${friend.relation}</span>
              </div>
              <div class="friend-quote">
                <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#e67e22" stroke-width="2"><path d="M16 3a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2 1 1 0 0 1 1 1v1a2 2 0 0 1-2 2 1 1 0 0 0-1 1v2a1 1 0 0 0 1 1 6 6 0 0 0 6-6V5a2 2 0 0 0-2-2z"/><path d="M5 3a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2 1 1 0 0 1 1 1v1a2 2 0 0 1-2 2 1 1 0 0 0-1 1v2a1 1 0 0 0 1 1 6 6 0 0 0 6-6V5a2 2 0 0 0-2-2z"/></svg>
                <span style="font-size:0.7rem; color:#a07a5c; font-style:italic;">${friend.quote}</span>
              </div>
              <div class="friend-status" style="background:${dotColor}10; color:${dotColor};">
                <div style="width:0.5rem; height:0.5rem; background:${dotColor}; border-radius:50%;"></div>
                <span>${friend.statusText}</span>
              </div>
            </div>
            <div class="action-buttons">
              <button class="action-btn" data-action="${friend.actionType}" data-id="${friend.id}">
                ${actionSvg}
                <span>${friend.actionLabel}</span>
              </button>
              <div class="arrow-icon">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m9 18 6-6-6-6"/></svg>
              </div>
            </div>
          </div>
        `;
      }).join('');

      container.innerHTML = heroHtml + cardsHtml;
      
      // 绑定添加按钮
      document.getElementById('addFriendBtn')?.addEventListener('click', addFriend);
      
      // 绑定卡片点击（查看详情）
      document.querySelectorAll('.friend-card').forEach(card => {
        card.addEventListener('click', (e) => {
          // 防止点击内部按钮时冒泡触发卡片详情
          if (e.target.closest('.action-btn')) return;
          const id = card.getAttribute('data-id');
          // 跳转到详情页或弹出信息，这里简单 alert
          alert(`点击查看 ${friends.find(f => f.id === id)?.name} 的饮食记录`);
          // 可改为 window.location.href = '关怀互动页.html?id=' + id;
        });
      });
      
      // 绑定动作按钮
      document.querySelectorAll('.action-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          const action = btn.getAttribute('data-action');
          const id = btn.getAttribute('data-id');
          interact(id, action);
        });
      });
    }

    // 底部导航栏跳转
    function initBottomNav() {
      const navs = document.querySelectorAll('.nav-item');
      navs.forEach(nav => {
        nav.addEventListener('click', () => {
          const navTo = nav.getAttribute('data-nav');
          if (navTo === 'home') window.location.href = '饮食管理首页.html';
          else if (navTo === 'record') window.location.href = '打卡详情页.html';
          else if (navTo === 'friends') window.location.href = '亲友共享空间主页.html';
          else if (navTo === 'report') window.location.href = '饮食趋势报表.html';
        });
      });
    }

    // 返回按钮
    document.getElementById('backBtn').addEventListener('click', () => {
      window.location.href = '饮食管理首页.html';
    });

    renderFriendsList();
    initBottomNav();
  </script>
</body>
</html>
