<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>打卡成功 - 吃了么</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #fef9e8;
      font-family: -apple-system, "PingFang SC", "Noto Sans SC", system-ui, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem;
      background: #fff9f0;
      border-bottom: 1px solid #f0e4d4;
    }
    .back-btn {
      width: 2rem;
      height: 2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      border-radius: 50%;
    }
    .back-btn:hover { background: #f0e4d4; }
    .title { font-size: 1.1rem; font-weight: 600; color: #5a3e2b; }
    .main { flex: 1; overflow-y: auto; padding: 1rem; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .card {
      background: white;
      border-radius: 1.5rem;
      border: 1px solid #f0e4d4;
      padding: 1.5rem;
      width: 100%;
      max-width: 380px;
      margin: 0 auto;
    }
    .success-icon {
      width: 4rem;
      height: 4rem;
      background: #fdf3e8;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1rem;
    }
    .success-icon svg { width: 2rem; height: 2rem; stroke: #e67e22; stroke-width: 1.5; }
    .title-text { font-size: 1.5rem; font-weight: 700; text-align: center; color: #5a3e2b; margin-bottom: 0.25rem; }
    .sub-text { text-align: center; color: #a07a5c; font-size: 0.85rem; margin-bottom: 1rem; }
    .meal-info {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid #f0e4d4;
      margin-bottom: 1rem;
    }
    .meal-icon { width: 3rem; height: 3rem; background: #fdf3e8; border-radius: 0.75rem; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; }
    .meal-detail { flex: 1; }
    .meal-label { font-size: 0.7rem; color: #a07a5c; margin-bottom: 0.2rem; }
    .meal-name { font-weight: 600; color: #5a3e2b; }
    .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; margin-bottom: 1rem; }
    .stat-item { background: #fffbf5; border-radius: 0.75rem; padding: 0.75rem; text-align: center; }
    .stat-emoji { font-size: 1.5rem; margin-bottom: 0.25rem; }
    .stat-value { font-size: 1.2rem; font-weight: 700; color: #e67e22; }
    .stat-label { font-size: 0.7rem; color: #a07a5c; }
    .tip-card { background: #fff7f0; border-radius: 1rem; padding: 1rem; margin: 1rem 0; text-align: center; }
    .tip-title { font-weight: 600; color: #5a3e2b; margin-bottom: 0.25rem; font-size: 0.9rem; }
    .tip-text { font-size: 0.75rem; color: #a07a5c; line-height: 1.4; }
    .btn-primary {
      width: 100%;
      background: #e67e22;
      border: none;
      border-radius: 2rem;
      padding: 0.8rem;
      font-weight: 600;
      font-size: 0.9rem;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      cursor: pointer;
      margin-bottom: 0.75rem;
    }
    .btn-secondary {
      width: 100%;
      background: transparent;
      border: 1px solid #e2d4c8;
      border-radius: 2rem;
      padding: 0.8rem;
      font-weight: 600;
      font-size: 0.9rem;
      color: #a07a5c;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      cursor: pointer;
    }
  </style>
  <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore-compat.js"></script>
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyCVdUzsAMepg1knrDg4ID7tM3xb_0ILyPM",
      authDomain: "beatricesaturn-6ff7e.firebaseapp.com",
      projectId: "beatricesaturn-6ff7e",
      storageBucket: "beatricesaturn-6ff7e.firebasestorage.app",
      messagingSenderId: "607338984635",
      appId: "1:607338984635:web:a4b3668715462a4d0ca59e",
      measurementId: "G-L2R10QZZL9"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    let currentUser = null;

    auth.onAuthStateChanged(user => {
      if (user) {
        currentUser = user;
        loadLatestMeal();
      } else {
        window.location.href = 'index.html';
      }
    });

    async function loadLatestMeal() {
      try {
        const snapshot = await db.collection('meals')
          .where('userId', '==', currentUser.uid)
          .orderBy('createdAt', 'desc')
          .limit(1)
          .get();
        if (snapshot.empty) {
          // 没有记录时显示默认信息
          renderDefault();
          return;
        }
        const meal = snapshot.docs[0].data();
        renderMeal(meal);
      } catch (err) {
        console.error(err);
        renderDefault();
      }
    }

    function renderMeal(meal) {
      const mealTypeMap = { breakfast: '早餐', lunch: '午餐', dinner: '晚餐', snack: '加餐' };
      const moodMap = { relaxed: '放松', busy: '忙碌', stressed: '压力', energized: '充能', tired: '疲惫' };
      const moodEmoji = { relaxed: '😊', busy: '⚡', stressed: '😰', energized: '💪', tired: '😴' };
      const mealType = mealTypeMap[meal.mealType] || '餐食';
      const moodName = moodMap[meal.mood] || '放松';
      const moodEmojiIcon = moodEmoji[meal.mood] || '😊';
      const kcal = meal.kcal ? `${meal.kcal} kcal` : '--';

      const tips = [
        '坚持规律饮食，让身体和心灵都得到照顾。',
        '每一餐都是对自己的关爱，继续加油！',
        '记录饮食是了解自己的第一步，你很棒！',
        '吃得好，心情也会更好～',
        '按时吃饭，元气满满一整天！'
      ];
      const randomTip = tips[Math.floor(Math.random() * tips.length)];

      const html = `
        <div class="card">
          <div class="success-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></svg></div>
          <div class="title-text">打卡成功！</div>
          <div class="sub-text">今天也在认真照顾自己。</div>
          <div class="meal-info">
            <div class="meal-icon">${meal.mealType === 'breakfast' ? '☕' : (meal.mealType === 'lunch' ? '🍱' : (meal.mealType === 'dinner' ? '🍲' : '🍎'))}</div>
            <div class="meal-detail">
              <div class="meal-label">${mealType}</div>
              <div class="meal-name">${escapeHtml(meal.mealName)}</div>
            </div>
          </div>
          <div class="stats-grid">
            <div class="stat-item"><div class="stat-emoji">${moodEmojiIcon}</div><div class="stat-value">${moodName}</div><div class="stat-label">当时心情</div></div>
            <div class="stat-item"><div class="stat-emoji">🔥</div><div class="stat-value">${kcal}</div><div class="stat-label">卡路里</div></div>
          </div>
          <div class="tip-card">
            <div class="tip-title">💡 小贴士</div>
            <div class="tip-text">${escapeHtml(randomTip)}</div>
          </div>
          <button class="btn-primary" id="viewProgressBtn">📊 查看今日进度</button>
          <button class="btn-secondary" id="continueLoggingBtn">➕ 继续记录其他餐次</button>
        </div>
      `;
      document.getElementById('mainContent').innerHTML = html;
      bindButtons();
    }

    function renderDefault() {
      const html = `
        <div class="card">
          <div class="success-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></svg></div>
          <div class="title-text">打卡成功！</div>
          <div class="sub-text">今天也在认真照顾自己。</div>
          <div class="tip-card">
            <div class="tip-title">💡 小贴士</div>
            <div class="tip-text">坚持规律饮食，让身体和心灵都得到照顾。今天的每一次打卡，都是对自己的关爱。</div>
          </div>
          <button class="btn-primary" id="viewProgressBtn">📊 查看今日进度</button>
          <button class="btn-secondary" id="continueLoggingBtn">➕ 继续记录其他餐次</button>
        </div>
      `;
      document.getElementById('mainContent').innerHTML = html;
      bindButtons();
    }

    function bindButtons() {
      document.getElementById('viewProgressBtn')?.addEventListener('click', () => {
        window.location.href = '饮食管理首页.html';
      });
      document.getElementById('continueLoggingBtn')?.addEventListener('click', () => {
        window.location.href = '打卡详情页.html';
      });
    }

    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
      });
    }

    document.getElementById('backBtn').addEventListener('click', () => {
      window.location.href = '饮食管理首页.html';
    });
  </script>
</head>
<body>
  <div class="header">
    <div class="back-btn" id="backBtn">←</div>
    <div class="title">打卡成功</div>
    <div style="width:2rem;"></div>
  </div>
  <div class="main" id="mainContent">
    <div style="text-align: center; padding: 2rem;">加载中...</div>
  </div>
</body>
</html>
