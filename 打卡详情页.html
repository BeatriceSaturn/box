<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>记录饮食 - 吃了么</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #fef9e8;
      font-family: -apple-system, "PingFang SC", "Noto Sans SC", system-ui, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem;
      background: #fff9f0;
      border-bottom: 1px solid #f0e4d4;
    }
    .back-btn {
      width: 2rem;
      height: 2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      border-radius: 50%;
    }
    .back-btn:hover { background: #f0e4d4; }
    .title { font-size: 1.1rem; font-weight: 600; color: #5a3e2b; }
    .main { flex: 1; overflow-y: auto; padding: 1rem; }
    .card {
      background: white;
      border-radius: 1rem;
      border: 1px solid #f0e4d4;
      padding: 1rem;
      margin-bottom: 1rem;
    }
    .section-label { font-size: 0.85rem; font-weight: 600; color: #5a3e2b; margin-bottom: 0.5rem; display: block; }
    .meal-grid, .mood-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0.5rem;
      margin-bottom: 0.5rem;
    }
    .mood-grid { grid-template-columns: repeat(5, 1fr); }
    .meal-btn, .mood-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.25rem;
      padding: 0.5rem;
      background: #fffbf5;
      border: 1px solid #f0e4d4;
      border-radius: 0.75rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .meal-btn.active, .mood-btn.active {
      background: #e67e22;
      border-color: #e67e22;
      color: white;
    }
    .meal-btn svg, .mood-btn svg { width: 1.5rem; height: 1.5rem; stroke: currentColor; }
    .upload-zone {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      padding: 1rem;
      border: 2px dashed #e2d4c8;
      border-radius: 1rem;
      cursor: pointer;
      background: #fffbf5;
    }
    .upload-zone:hover { border-color: #e67e22; }
    .image-preview { margin-top: 0.5rem; max-width: 100%; max-height: 150px; border-radius: 0.75rem; }
    input, textarea {
      width: 100%;
      padding: 0.7rem;
      border: 1px solid #e2d4c8;
      border-radius: 0.75rem;
      font-size: 1rem;
      background: white;
      margin-bottom: 0.5rem;
    }
    .time-row {
      display: flex;
      gap: 0.5rem;
      align-items: center;
    }
    .time-input { flex: 1; margin-bottom: 0; }
    .time-btn { padding: 0.7rem; background: #fdf3e8; border: none; border-radius: 0.75rem; cursor: pointer; }
    .btn-submit, .btn-cancel {
      width: 100%;
      padding: 0.8rem;
      border-radius: 2rem;
      font-weight: 600;
      margin-top: 0.5rem;
      cursor: pointer;
    }
    .btn-submit { background: #e67e22; border: none; color: white; }
    .btn-cancel { background: transparent; border: 1px solid #e2d4c8; color: #a07a5c; }
    .button-group { display: flex; gap: 1rem; margin-top: 1rem; }
    .button-group .btn-submit, .button-group .btn-cancel { margin-top: 0; }
  </style>
  <!-- Firebase SDK (Compat) -->
  <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore-compat.js"></script>
  <script>
    // 你的 Firebase 配置（与 index.html 保持一致）
    const firebaseConfig = {
      apiKey: "AIzaSyCVdUzsAMepg1knrDg4ID7tM3xb_0ILyPM",
      authDomain: "beatricesaturn-6ff7e.firebaseapp.com",
      projectId: "beatricesaturn-6ff7e",
      storageBucket: "beatricesaturn-6ff7e.firebasestorage.app",
      messagingSenderId: "607338984635",
      appId: "1:607338984635:web:a4b3668715462a4d0ca59e",
      measurementId: "G-L2R10QZZL9"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
  </script>
</head>
<body>
  <div class="header">
    <div class="back-btn" id="backBtn">←</div>
    <div class="title">记录饮食</div>
    <div style="width:2rem;"></div>
  </div>
  <div class="main">
    <div class="card">
      <div class="section-label">选择餐次</div>
      <div class="meal-grid" id="mealGrid">
        <div class="meal-btn active" data-meal="breakfast">☕<span>早餐</span></div>
        <div class="meal-btn" data-meal="lunch">🍱<span>午餐</span></div>
        <div class="meal-btn" data-meal="dinner">🍲<span>晚餐</span></div>
        <div class="meal-btn" data-meal="snack">🍎<span>加餐</span></div>
      </div>

      <div class="section-label">上传餐食照片</div>
      <div class="upload-zone" id="uploadZone">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#c0a080" stroke-width="1.5"><path d="M13.997 4a2 2 0 0 1 1.76 1.05l.486.9A2 2 0 0 0 18.003 7H20a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V9a2 2 0 0 1 2-2h1.997a2 2 0 0 0 1.759-1.048l.489-.904A2 2 0 0 1 10.004 4z"/><circle cx="12" cy="13" r="3"/></svg>
        <div style="text-align:center;"><p>点击上传照片</p><p style="font-size:0.7rem;">支持 jpg/png</p></div>
        <div class="image-preview" id="imagePreview" style="display:none;"><img id="previewImg" style="max-width:100%; max-height:120px;"></div>
      </div>
      <input type="file" id="imageInput" accept="image/*" style="display:none;">

      <div class="section-label">餐食名称 <span style="color:#e67e22;">*</span></div>
      <input type="text" id="mealName" placeholder="例如：番茄鸡蛋面、燕麦酸奶碗">

      <div class="section-label">进食时间 <span style="color:#e67e22;">*</span></div>
      <div class="time-row">
        <input type="time" id="mealTime" class="time-input" value="12:00">
        <button class="time-btn" id="nowTimeBtn">现在</button>
      </div>

      <div class="section-label">当时心情</div>
      <div class="mood-grid" id="moodGrid">
        <div class="mood-btn" data-mood="relaxed">😊<span>放松</span></div>
        <div class="mood-btn" data-mood="busy">⚡<span>忙碌</span></div>
        <div class="mood-btn" data-mood="stressed">😰<span>压力</span></div>
        <div class="mood-btn" data-mood="energized">💪<span>充能</span></div>
        <div class="mood-btn" data-mood="tired">😴<span>疲惫</span></div>
      </div>

      <div class="section-label">饮食备注</div>
      <textarea id="mealNote" rows="3" placeholder="分享一下这顿饭的感受..."></textarea>

      <div class="button-group">
        <button class="btn-cancel" id="cancelBtn">取消</button>
        <button class="btn-submit" id="submitBtn">完成打卡</button>
      </div>
    </div>
  </div>

  <script>
    // 获取当前用户
    let currentUser = null;
    auth.onAuthStateChanged(user => { currentUser = user; });

    // 餐次选择
    let selectedMeal = 'breakfast';
    document.querySelectorAll('.meal-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.meal-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        selectedMeal = btn.getAttribute('data-meal');
      });
    });

    // 心情选择
    let selectedMood = 'relaxed';
    document.querySelectorAll('.mood-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        selectedMood = btn.getAttribute('data-mood');
      });
    });
    document.querySelector('.mood-btn[data-mood="relaxed"]').classList.add('active');

    // 时间
    function setCurrentTime() {
      const now = new Date();
      const hours = String(now.getHours()).padStart(2,'0');
      const minutes = String(now.getMinutes()).padStart(2,'0');
      document.getElementById('mealTime').value = `${hours}:${minutes}`;
    }
    setCurrentTime();
    document.getElementById('nowTimeBtn').addEventListener('click', setCurrentTime);

    // 图片上传
    let imageData = null;
    const uploadZone = document.getElementById('uploadZone');
    const imageInput = document.getElementById('imageInput');
    const previewImg = document.getElementById('previewImg');
    const imagePreview = document.getElementById('imagePreview');
    uploadZone.addEventListener('click', () => imageInput.click());
    imageInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = (ev) => {
          imageData = ev.target.result;
          previewImg.src = imageData;
          imagePreview.style.display = 'block';
        };
        reader.readAsDataURL(file);
      }
    });

    // 保存打卡
    document.getElementById('submitBtn').addEventListener('click', async () => {
      const mealName = document.getElementById('mealName').value.trim();
      if (!mealName) { alert('请填写餐食名称'); return; }
      const mealTime = document.getElementById('mealTime').value;
      if (!mealTime) { alert('请选择进食时间'); return; }
      if (!currentUser) { alert('请先登录'); return; }

      const today = new Date().toISOString().slice(0,10);
      const record = {
        userId: currentUser.uid,
        mealType: selectedMeal,
        mealName: mealName,
        mealTime: mealTime,
        mood: selectedMood,
        note: document.getElementById('mealNote').value,
        image: imageData,  // 注意：base64 图片可能很大，建议后续改用 Firebase Storage
        kcal: 0,           // 可扩展计算
        date: today,
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      };

      try {
        await db.collection('meals').add(record);
        // 同时更新三餐打卡状态（简单处理：更新到 checkins 子集合或单独的表，这里简化）
        // 为了后续报表，可以记录到 checkins 集合
        const checkinRef = db.collection('checkins').doc(`${currentUser.uid}_${today}`);
        await checkinRef.set({
          [selectedMeal]: true,
          updatedAt: firebase.firestore.FieldValue.serverTimestamp()
        }, { merge: true });
        alert('打卡成功！');
        window.location.href = '打卡反馈页.html';
      } catch (err) {
        console.error(err);
        alert('保存失败：' + err.message);
      }
    });

    document.getElementById('cancelBtn').addEventListener('click', () => {
      window.location.href = '饮食管理首页.html';
    });
    document.getElementById('backBtn').addEventListener('click', () => {
      window.location.href = '饮食管理首页.html';
    });
  </script>
</body>
</html>
