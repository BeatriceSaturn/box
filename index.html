<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>吃了么 - 登录</title>
  <style>
    /* ========== 完整样式（与之前一致） ========== */
    *, ::before, ::after { box-sizing: border-box; margin: 0; }
    :root {
      --background: 30 25% 97%;
      --foreground: 25 15% 20%;
      --card: 40 30% 99%;
      --primary: 20 85% 68%;
      --primary-foreground: 0 0% 100%;
      --accent: 160 55% 70%;
      --accent-foreground: 160 30% 15%;
      --muted: 350 20% 85%;
      --muted-foreground: 350 10% 45%;
      --border: 30 15% 88%;
      --input: 30 15% 88%;
      --radius: 1rem;
      --shadow-soft: 0 2px 8px rgba(0, 0, 0, 0.06);
    }
    body {
      background-color: hsl(var(--background));
      color: hsl(var(--foreground));
      font-family: -apple-system, "PingFang SC", "Noto Sans SC", system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .flex { display: flex; }
    .flex-col { flex-direction: column; }
    .items-center { align-items: center; }
    .justify-center { justify-content: center; }
    .text-center { text-align: center; }
    .pt-12 { padding-top: 3rem; }
    .pb-8 { padding-bottom: 2rem; }
    .px-6 { padding-left: 1.5rem; padding-right: 1.5rem; }
    .mb-4 { margin-bottom: 1rem; }
    .p-4 { padding: 1rem; }
    .rounded-full { border-radius: 9999px; }
    .bg-gradient-to-br { background-image: linear-gradient(to bottom right, var(--tw-gradient-stops)); }
    .from-primary\/20 { --tw-gradient-from: hsl(var(--primary) / 0.2); --tw-gradient-stops: var(--tw-gradient-from), var(--tw-gradient-to); }
    .to-accent\/20 { --tw-gradient-to: hsl(var(--accent) / 0.2); }
    .text-primary { color: hsl(var(--primary)); }
    .text-3xl { font-size: 1.875rem; line-height: 2.25rem; }
    .font-bold { font-weight: 700; }
    .tracking-tight { letter-spacing: -0.025em; }
    .text-foreground { color: hsl(var(--foreground)); }
    .text-base { font-size: 1rem; line-height: 1.5rem; }
    .text-muted-foreground { color: hsl(var(--muted-foreground)); }
    .max-w-xs { max-width: 20rem; }
    .leading-relaxed { line-height: 1.625; }
    .mt-6 { margin-top: 1.5rem; }
    .gap-2 { gap: 0.5rem; }
    .text-accent\/60 { color: hsl(var(--accent) / 0.6); }
    .w-8 { width: 2rem; }
    .h-px { height: 1px; }
    .bg-gradient-to-r { background-image: linear-gradient(to right, var(--tw-gradient-stops)); }
    .from-transparent { --tw-gradient-from: transparent; --tw-gradient-stops: var(--tw-gradient-from), var(--tw-gradient-to); }
    .to-accent\/40 { --tw-gradient-to: hsl(var(--accent) / 0.4); }
    .bg-gradient-to-l { background-image: linear-gradient(to left, var(--tw-gradient-stops)); }
    .flex-1 { flex: 1 1 0%; }
    .px-0 { padding-left: 0; padding-right: 0; }
    .w-full { width: 100%; }
    .px-5 { padding-left: 1.25rem; padding-right: 1.25rem; }
    .py-6 { padding-top: 1.5rem; padding-bottom: 1.5rem; }
    .space-y-4 > :not([hidden]) ~ :not([hidden]) { margin-top: 1rem; }
    .mb-6 { margin-bottom: 1.5rem; }
    .text-lg { font-size: 1.125rem; line-height: 1.75rem; }
    .font-semibold { font-weight: 600; }
    .mb-1 { margin-bottom: 0.25rem; }
    .text-sm { font-size: 0.875rem; line-height: 1.25rem; }
    .space-y-3 > :not([hidden]) ~ :not([hidden]) { margin-top: 0.75rem; }
    .h-14 { height: 3.5rem; }
    .rounded-lg { border-radius: var(--radius); }
    .border { border-width: 1px; }
    .border-border { border-color: hsl(var(--border)); }
    .bg-card { background-color: hsl(var(--card)); }
    .hover\:bg-card\/80:hover { background-color: hsl(var(--card) / 0.8); }
    .active\:scale-\[0\.98\]:active { transform: scale(0.98); }
    .transition-all { transition: all 0.15s cubic-bezier(0.4, 0, 0.2, 1); }
    .shadow-soft { box-shadow: var(--shadow-soft); }
    .font-medium { font-weight: 500; }
    .my-6 { margin-top: 1.5rem; margin-bottom: 1.5rem; }
    .bg-border { background-color: hsl(var(--border)); }
    .text-xs { font-size: 0.75rem; line-height: 1rem; }
    .h-12 { height: 3rem; }
    .rounded-md { border-radius: calc(var(--radius) - 2px); }
    .border-input { border-color: hsl(var(--input)); }
    .bg-transparent { background-color: transparent; }
    .hover\:bg-accent:hover { background-color: hsl(var(--accent)); }
    .hover\:text-accent-foreground:hover { color: hsl(var(--accent-foreground)); }
    .mt-8 { margin-top: 2rem; }
    .bg-accent\/10 { background-color: hsl(var(--accent) / 0.1); }
    .border-accent\/20 { border-color: hsl(var(--accent) / 0.2); }
    .text-accent { color: hsl(var(--accent)); }
    .flex-shrink-0 { flex-shrink: 0; }
    .mt-0\.5 { margin-top: 0.125rem; }
    .text-accent-foreground\/80 { color: hsl(var(--accent-foreground) / 0.8); }
    .pb-6 { padding-bottom: 1.5rem; }
    .hover\:underline:hover { text-decoration: underline; }
    .transition-colors { transition: color 0.15s, background-color 0.15s, border-color 0.15s; }
    .gap-3 { gap: 0.75rem; }
    button { cursor: pointer; background: none; border: none; }
    a { text-decoration: none; }
  </style>
</head>
<body>
  <div class="flex flex-col min-h-screen">
    <!-- 品牌区域 -->
    <div class="flex flex-col items-center justify-center pt-12 pb-8 px-6 text-center">
      <div class="mb-4 p-4 rounded-full bg-gradient-to-br from-primary/20 to-accent/20">
        <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="text-primary">
          <path d="m16 2-2.3 2.3a3 3 0 0 0 0 4.2l1.8 1.8a3 3 0 0 0 4.2 0L22 8"></path>
          <path d="M15 15 3.3 3.3a4.2 4.2 0 0 0 0 6l7.3 7.3c.7.7 2 .7 2.8 0L15 15Zm0 0 7 7"></path>
          <path d="m2.1 21.8 6.4-6.3"></path>
          <path d="m19 5-7 7"></path>
        </svg>
      </div>
      <h1 class="text-3xl font-bold tracking-tight mb-2 text-foreground">吃了么</h1>
      <p class="text-base text-muted-foreground max-w-xs leading-relaxed">规律饮食，健康生活。与家人朋友一起，养成好好吃饭的习惯。</p>
      <div class="mt-6 flex items-center gap-2 text-accent/60">
        <div class="w-8 h-px bg-gradient-to-r from-transparent to-accent/40"></div>
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 9.5a5.5 5.5 0 0 1 9.591-3.676.56.56 0 0 0 .818 0A5.49 5.49 0 0 1 22 9.5c0 2.29-1.5 4-3 5.5l-5.492 5.313a2 2 0 0 1-3 .019L5 15c-1.5-1.5-3-3.2-3-5.5"></path></svg>
        <div class="w-8 h-px bg-gradient-to-l from-transparent to-accent/40"></div>
      </div>
    </div>

    <!-- 登录表单 -->
    <div class="flex-1 flex flex-col justify-center px-0">
      <div class="w-full px-5 py-6 space-y-4">
        <div class="mb-6 text-center">
          <h2 class="text-lg font-semibold text-foreground mb-1">选择登录方式</h2>
          <p class="text-sm text-muted-foreground">快速进入您的饮食管理空间</p>
        </div>
        <div class="space-y-3">
          <!-- 微信登录按钮 -->
          <button id="wechatLogin" class="w-full h-14 flex items-center justify-center gap-3 rounded-lg border border-border bg-card hover:bg-card/80 active:scale-[0.98] transition-all shadow-soft">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-primary"><path d="M2.992 16.342a2 2 0 0 1 .094 1.167l-1.065 3.29a1 1 0 0 0 1.236 1.168l3.413-.998a2 2 0 0 1 1.099.092 10 10 0 1 0-4.777-4.719"></path><path d="M8 12h.01"></path><path d="M12 12h.01"></path><path d="M16 12h.01"></path></svg>
            <span class="text-base font-medium text-foreground">微信登录</span>
          </button>
          <!-- 邮箱登录按钮 -->
          <button id="emailLogin" class="w-full h-14 flex items-center justify-center gap-3 rounded-lg border border-border bg-card hover:bg-card/80 active:scale-[0.98] transition-all shadow-soft">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-primary"><path d="m22 7-8.991 5.727a2 2 0 0 1-2.009 0L2 7"></path><rect x="2" y="4" width="20" height="16" rx="2"></rect></svg>
            <span class="text-base font-medium text-foreground">邮箱登录</span>
          </button>
          <!-- 手机号登录按钮 -->
          <button id="phoneLogin" class="w-full h-14 flex items-center justify-center gap-3 rounded-lg border border-border bg-card hover:bg-card/80 active:scale-[0.98] transition-all shadow-soft">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-primary"><rect width="14" height="20" x="5" y="2" rx="2" ry="2"></rect><path d="M12 18h.01"></path></svg>
            <span class="text-base font-medium text-foreground">手机号登录</span>
          </button>
        </div>
        <div class="flex items-center gap-3 my-6">
          <div class="flex-1 h-px bg-border"></div>
          <span class="text-xs text-muted-foreground">或</span>
          <div class="flex-1 h-px bg-border"></div>
        </div>
        <!-- 游客浏览按钮 -->
        <button id="guestLogin" class="w-full h-12 flex items-center justify-center gap-2 rounded-md border border-input bg-transparent hover:bg-accent hover:text-accent-foreground text-base font-medium">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0"></path><circle cx="12" cy="12" r="3"></circle></svg>
          游客浏览
        </button>
        <div class="mt-8 p-4 rounded-lg bg-accent/10 border border-accent/20 space-y-2">
          <div class="flex gap-2">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="text-accent flex-shrink-0 mt-0.5"><circle cx="12" cy="12" r="10"></circle><path d="M12 16v-4"></path><path d="M12 8h.01"></path></svg>
            <div class="text-sm text-accent-foreground/80 leading-relaxed">
              <p class="font-medium mb-1">首次登录？</p>
              <p>我们会引导您完成个人档案设置，为您提供个性化的饮食建议。</p>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- 页脚 -->
    <footer class="text-center pb-6">
      <p class="text-muted-foreground text-xs">
        登录即表示您同意
        <a href="#" class="text-primary hover:underline transition-colors">用户协议</a>
        和
        <a href="#" class="text-primary hover:underline transition-colors">隐私政策</a>
      </p>
    </footer>
  </div>

  <script>
    // 所有登录按钮都跳转到“基础信息采集页.html”
    // 如果你希望不同的按钮跳转到不同页面，可以修改对应的 href 值
    const targetPage = '基础信息采集页.html';
    
    document.getElementById('wechatLogin').addEventListener('click', () => {
      window.location.href = targetPage;
    });
    document.getElementById('emailLogin').addEventListener('click', () => {
      window.location.href = targetPage;
    });
    document.getElementById('phoneLogin').addEventListener('click', () => {
      window.location.href = targetPage;
    });
    document.getElementById('guestLogin').addEventListener('click', () => {
      window.location.href = targetPage;
    });
  </script>
</body>
</html>
