<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>吃了么 - 登录</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #fef9e8;
      font-family: -apple-system, "PingFang SC", "Noto Sans SC", system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .container {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 2rem 1.5rem;
    }
    .logo {
      text-align: center;
      margin-bottom: 2rem;
    }
    .logo-icon {
      background: #ffd6b0;
      width: 72px;
      height: 72px;
      border-radius: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1rem;
    }
    .logo-icon svg {
      width: 40px;
      height: 40px;
      stroke: #e67e22;
      stroke-width: 1.5;
    }
    h1 {
      font-size: 2rem;
      font-weight: 700;
      color: #5a3e2b;
    }
    .sub {
      color: #a07a5c;
      margin-top: 0.5rem;
      font-size: 0.9rem;
    }
    .btn {
      width: 100%;
      padding: 0.9rem;
      border-radius: 48px;
      border: 1px solid #e2d4c8;
      background: white;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      font-size: 1rem;
      font-weight: 500;
      color: #5a3e2b;
      cursor: pointer;
      margin-bottom: 1rem;
      transition: all 0.2s;
    }
    .btn:hover {
      background: #fff5eb;
      transform: translateY(-1px);
    }
    .divider {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin: 1.5rem 0;
      color: #c0a080;
      font-size: 0.8rem;
    }
    .divider-line {
      flex: 1;
      height: 1px;
      background: #e2d4c8;
    }
    .info {
      margin-top: 2rem;
      background: #fff2e6;
      padding: 1rem;
      border-radius: 24px;
      font-size: 0.8rem;
      color: #a07a5c;
    }
    footer {
      text-align: center;
      padding: 1rem;
      font-size: 0.7rem;
      color: #c0a080;
    }
    a { color: #e67e22; text-decoration: none; }
  </style>
  <!-- Supabase SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    // 已替换为你的实际值
    const SUPABASE_URL = 'https://akxuloriodjnhgujonsr.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFreHVsb3Jpb2RqbmhndWpvbnNyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1ODM1ODIsImV4cCI6MjA5MjE1OTU4Mn0.Lb43TKoqLKAHab65Oyr9hFUFGygb9gofu05lkihw60w';

    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // 页面加载时自动匿名登录
    window.onload = async () => {
      const { data, error } = await supabase.auth.signInAnonymously();
      if (error) {
        console.error('匿名登录失败:', error.message);
        alert('初始化失败，请刷新页面重试。');
      } else {
        console.log('登录成功，用户ID:', data.user.id);
        sessionStorage.setItem('userId', data.user.id);
      }
    };
  </script>
</head>
<body>
  <div class="container">
    <div class="logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
          <path d="m16 2-2.3 2.3a3 3 0 0 0 0 4.2l1.8 1.8a3 3 0 0 0 4.2 0L22 8"/>
          <path d="M15 15 3.3 3.3a4.2 4.2 0 0 0 0 6l7.3 7.3c.7.7 2 .7 2.8 0L15 15Zm0 0 7 7"/>
          <path d="m2.1 21.8 6.4-6.3"/>
          <path d="m19 5-7 7"/>
        </svg>
      </div>
      <h1>吃了么</h1>
      <p class="sub">规律饮食，健康生活。<br>与家人朋友一起，养成好好吃饭的习惯。</p>
    </div>

    <div>
      <button class="btn" id="wechatBtn">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2.992 16.342a2 2 0 0 1 .094 1.167l-1.065 3.29a1 1 0 0 0 1.236 1.168l3.413-.998a2 2 0 0 1 1.099.092 10 10 0 1 0-4.777-4.719"/><path d="M8 12h.01"/><path d="M12 12h.01"/><path d="M16 12h.01"/></svg>
        微信登录
      </button>
      <button class="btn" id="emailBtn">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m22 7-8.991 5.727a2 2 0 0 1-2.009 0L2 7"/><rect x="2" y="4" width="20" height="16" rx="2"/></svg>
        邮箱登录
      </button>
      <button class="btn" id="phoneBtn">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="2" width="14" height="20" rx="2" ry="2"/><path d="M12 18h.01"/></svg>
        手机号登录
      </button>

      <div class="divider">
        <span class="divider-line"></span>
        <span>或</span>
        <span class="divider-line"></span>
      </div>

      <button class="btn" id="guestBtn" style="background:transparent;">游客浏览</button>

      <div class="info">
        <strong>首次登录？</strong><br>
        我们会引导您完成个人档案设置，为您提供个性化的饮食建议。
      </div>
    </div>
  </div>
  <footer>
    登录即表示您同意 <a href="#">用户协议</a> 和 <a href="#">隐私政策</a>
  </footer>

  <script>
    const toProfile = () => { window.location.href = '基础信息采集页.html'; };
    document.getElementById('wechatBtn').addEventListener('click', toProfile);
    document.getElementById('emailBtn').addEventListener('click', toProfile);
    document.getElementById('phoneBtn').addEventListener('click', toProfile);
    document.getElementById('guestBtn').addEventListener('click', toProfile);
  </script>
</body>
</html>
