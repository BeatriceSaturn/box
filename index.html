<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>吃了么 - 登录调试</title>
    <script src="https://static.cloudbase.net/cloudbase-js-sdk/latest/cloudbase.full.js"></script>
    <style>
        body { font-family: monospace; padding: 2rem; max-width: 500px; margin: 0 auto; background: #fef9e8; }
        input, button { display: block; width: 100%; padding: 0.5rem; margin: 0.5rem 0; font-size: 1rem; }
        .log { background: #f0e4d4; padding: 1rem; border-radius: 1rem; margin-top: 1rem; white-space: pre-wrap; font-size: 0.8rem; max-height: 300px; overflow-y: auto; }
        h1 { color: #5a3e2b; }
    </style>
</head>
<body>
    <h1>吃了么 - 登录调试</h1>
    <input type="email" id="email" placeholder="邮箱地址" autocomplete="email">
    <input type="password" id="password" placeholder="密码（请自己记住）" autocomplete="new-password">
    <button id="loginBtn">登录 / 注册</button>
    <button id="guestBtn">游客浏览</button>
    <div class="log" id="log"></div>

    <script>
        const logDiv = document.getElementById('log');
        function log(msg) {
            console.log(msg);
            logDiv.innerText += msg + '\n';
        }

        // 初始化 CloudBase
        log('初始化 CloudBase...');
        const app = cloudbase.init({
            env: 'beatrice-saturn-d7fu78ek2c55aa9b'
        });
        const auth = app.auth();
        log('CloudBase 初始化完成');

        // 跳转到采集页
        function goToProfile() {
            log('准备跳转到 基础信息采集页.html');
            window.location.href = '基础信息采集页.html';
        }

        // 邮箱登录/注册
        async function handleEmailLogin() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            if (!email || !password) {
                alert('请输入邮箱和密码');
                return;
            }
            log(`尝试登录/注册: ${email}`);
            const btn = document.getElementById('loginBtn');
            btn.disabled = true;
            btn.innerText = '处理中...';
            try {
                // 尝试登录
                await auth.signInWithEmailAndPassword(email, password);
                log('登录成功，用户:', auth.currentUser ? auth.currentUser.uid : 'null');
                alert('登录成功');
                goToProfile();
            } catch (error) {
                log('登录失败:', error.code, error.message);
                if (error.code === 'USER_NOT_FOUND' || error.message.includes('user not found')) {
                    const confirm = window.confirm('没有账号，是否立即注册？');
                    if (confirm) {
                        try {
                            await auth.signUpWithEmailAndPassword(email, password);
                            log('注册成功，用户:', auth.currentUser ? auth.currentUser.uid : 'null');
                            alert('注册成功');
                            goToProfile();
                        } catch (regError) {
                            log('注册失败:', regError.message);
                            alert('注册失败: ' + regError.message);
                        }
                    }
                } else {
                    alert('登录失败: ' + error.message);
                }
            } finally {
                btn.disabled = false;
                btn.innerText = '登录 / 注册';
            }
        }

        // 匿名登录
        async function handleGuestLogin() {
            log('尝试匿名登录');
            try {
                await auth.signInAnonymously();
                log('匿名登录成功，用户:', auth.currentUser ? auth.currentUser.uid : 'null');
                alert('匿名登录成功');
                goToProfile();
            } catch (error) {
                log('匿名登录失败:', error.message);
                alert('匿名登录失败: ' + error.message);
            }
        }

        document.getElementById('loginBtn').addEventListener('click', handleEmailLogin);
        document.getElementById('guestBtn').addEventListener('click', handleGuestLogin);
    </script>
</body>
</html>
