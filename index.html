<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>CloudBase 测试</title>
    <script src="https://static.cloudbase.net/cloudbase-js-sdk/latest/cloudbase.full.js"></script>
</head>
<body>
    <h1>CloudBase 初始化测试</h1>
    <pre id="log">加载中...</pre>
    <script>
        const log = document.getElementById('log');
        log.innerText = '开始初始化...\n';
        try {
            const app = cloudbase.init({
                env: 'beatrice-saturn-d7fu78ek2c55aa9b'
            });
            const auth = app.auth();
            log.innerText += '初始化成功，正在尝试匿名登录...\n';
            auth.signInAnonymously().then(() => {
                log.innerText += '匿名登录成功，用户已登录\n';
            }).catch(err => {
                log.innerText += '匿名登录失败：' + err.message + '\n';
            });
        } catch (e) {
            log.innerText += '初始化失败：' + e.message + '\n';
        }
    </script>
</body>
</html>
