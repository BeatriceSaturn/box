<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>吃了么 - 登录</title>
    <script src="https://static.cloudbase.net/cloudbase-js-sdk/latest/cloudbase.full.js"></script>
    <style>
        body { font-family: system-ui; max-width: 400px; margin: 2rem auto; padding: 1rem; background: #fef9e8; }
        input, button { width: 100%; padding: 0.7rem; margin: 0.5rem 0; border-radius: 2rem; border: 1px solid #e2d4c8; font-size: 1rem; }
        button { background: #e67e22; color: white; font-weight: bold; cursor: pointer; }
        .log { background: #f0e4d4; padding: 1rem; border-radius: 1rem; margin-top: 1rem; font-size: 0.8rem; white-space: pre-wrap; }
        h1 { color: #5a3e2b; text-align: center; }
        .warning { color: #d9534f; font-size: 0.8rem; margin-top: 1rem; text-align: center; }
    </style>
</head>
<body>
    <h1>吃了么</h1>
    <input type="email" id="email" placeholder="电子邮箱">
    <input type="password" id="password" placeholder="密码（请自己记住）">
    <button id="loginBtn">登录 / 注册</button>
    <button id="guestBtn">游客浏览</button>
    <div class="log" id="log"></div>
    <div class="warning" id="warning"></div>

    <script>
        const logDiv = document.getElementById('log');
        const warningDiv = document.getElementById('warning');
        function log(msg) {
            const p = document.createElement('div');
            p.textContent = msg;
            logDiv.appendChild(p);
            console.log(msg);
        }

        // 检测当前域名是否正确
        if (window.location.hostname.includes('github.io')) {
            warningDiv.innerHTML = '⚠️ 检测到你正在使用 GitHub Pages 域名访问，请使用腾讯云专属域名（beatrice-saturn...tcloudbaseapp.com）以获得完整功能。';
        }

        log('初始化 CloudBase...');
        let auth;
        try {
            const app = cloudbase.init({
                env: 'beatrice-saturn-d7fu78ek2c55aa9b'
            });
            auth = app.auth();
            log('CloudBase 初始化成功');
        } catch (e) {
            log('初始化失败: ' + e.message);
        }

        function goToProfile() {
            log('准备跳转到基础信息采集页');
            window.location.href = '基础信息采集页.html';
        }

        async function handleEmailLogin() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            if (!email || !password) {
                alert('请输入邮箱和密码');
                return;
            }
            log(`尝试登录/注册: ${email}`);
            const btn = document.getElementById('loginBtn');
            btn.disabled = true;
            btn.innerText = '处理中...';
            try {
                await auth.signInWithEmailAndPassword(email, password);
                log('登录成功');
                alert('登录成功');
                goToProfile();
            } catch (error) {
                log('登录失败: ' + (error.code || error.message));
                if (error.code === 'USER_NOT_FOUND' || (error.message && error.message.includes('user not found'))) {
                    const confirm = window.confirm('没有账号，是否立即注册？');
                    if (confirm) {
                        try {
                            await auth.signUpWithEmailAndPassword(email, password);
                            log('注册成功');
                            alert('注册成功');
                            goToProfile();
                        } catch (regError) {
                            log('注册失败: ' + regError.message);
                            alert('注册失败: ' + regError.message);
                        }
                    }
                } else {
                    alert('登录失败: ' + (error.message || error));
                }
            } finally {
                btn.disabled = false;
                btn.innerText = '登录 / 注册';
            }
        }

        async function handleGuestLogin() {
            log('尝试匿名登录');
            try {
                await auth.signInAnonymously();
                log('匿名登录成功');
                alert('匿名登录成功');
                goToProfile();
            } catch (error) {
                log('匿名登录失败: ' + error.message);
                alert('匿名登录失败: ' + error.message);
            }
        }

        document.getElementById('loginBtn').addEventListener('click', handleEmailLogin);
        document.getElementById('guestBtn').addEventListener('click', handleGuestLogin);
    </script>
</body>
</html>
