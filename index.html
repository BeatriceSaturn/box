<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudBase 认证测试</title>
    <script src="https://static.cloudbase.net/cloudbase-js-sdk/latest/cloudbase.full.js"></script>
</head>
<body>
    <h1>CloudBase 认证测试</h1>
    <div id="result">测试中...</div>
    <script>
        const resultDiv = document.getElementById('result');
        function log(msg) {
            resultDiv.innerHTML += '<br>' + msg;
            console.log(msg);
        }

        const app = cloudbase.init({
            env: 'beatrice-saturn-d7fu78ek2c55aa9b'
        });
        const auth = app.auth();

        // 测试邮箱和密码（请修改为你自己的测试邮箱）
        const testEmail = 'testuser123@example.com';
        const testPassword = 'test123';

        log('开始测试...');
        // 先尝试注册
        auth.signUpWithEmailAndPassword(testEmail, testPassword)
            .then(() => {
                log('注册成功！');
                // 注册成功后尝试登录
                return auth.signInWithEmailAndPassword(testEmail, testPassword);
            })
            .then(() => {
                log('登录成功！用户ID: ' + auth.currentUser.uid);
                log('✅ 邮箱登录功能正常');
            })
            .catch(error => {
                log('❌ 错误: ' + error.code + ' - ' + error.message);
                if (error.code === 'USER_NOT_FOUND') {
                    log('用户不存在，但注册失败了，请检查控制台设置');
                } else if (error.code === 'OPERATION_NOT_ALLOWED') {
                    log('“用户名密码”登录方式未开启，请在控制台开启');
                } else {
                    log('其他错误: ' + JSON.stringify(error));
                }
            });
    </script>
</body>
</html>
