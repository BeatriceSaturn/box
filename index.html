<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>吃了么 - 登录</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'PingFang SC', system-ui, -apple-system, sans-serif;
            background: #fef9e8;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }
        .card {
            max-width: 420px;
            width: 100%;
            background: white;
            border-radius: 32px;
            padding: 2rem 1.5rem;
            box-shadow: 0 8px 28px rgba(0,0,0,0.05);
            border: 1px solid #f0e4d4;
        }
        h1 { font-size: 2rem; font-weight: 700; color: #5a3e2b; text-align: center; margin-bottom: 0.25rem; }
        .subtitle { color: #a07a5c; font-size: 0.85rem; text-align: center; margin-bottom: 2rem; }
        .divider { text-align: center; margin: 1rem 0; color: #c0a080; font-size: 0.8rem; position: relative; }
        .divider-line { width: 100%; height: 1px; background: #f0e4d4; margin: 0.5rem 0 0.75rem; }
        .input-group { margin-bottom: 1rem; }
        input {
            width: 100%;
            padding: 0.8rem 1rem;
            border: 1px solid #e2d4c8;
            border-radius: 48px;
            font-size: 1rem;
            background: white;
            transition: all 0.2s;
        }
        input:focus { outline: none; border-color: #e67e22; box-shadow: 0 0 0 3px rgba(230,126,34,0.1); }
        .btn {
            width: 100%;
            padding: 0.8rem;
            border-radius: 48px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
        }
        .btn-primary { background: #e67e22; color: white; }
        .btn-primary:hover { background: #d4691a; transform: translateY(-1px); }
        .btn-secondary { background: transparent; border: 1px solid #e2d4c8; color: #a07a5c; margin-bottom: 0.5rem; }
        .btn-secondary:hover { background: #fff7f0; }
        .forgot-link { text-align: right; margin-top: -0.5rem; margin-bottom: 1rem; }
        .forgot-link a { color: #e67e22; font-size: 0.8rem; cursor: pointer; }
        .message { font-size: 0.85rem; text-align: center; margin-top: 1rem; padding: 0.5rem; border-radius: 24px; background: #fef5ea; color: #5a3e2b; }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-content {
            background: white;
            padding: 1.5rem;
            border-radius: 32px;
            width: 85%;
            max-width: 360px;
            text-align: center;
        }
        .modal-content input { margin-bottom: 1rem; }
    </style>
</head>
<body>
    <div class="card">
        <h1>吃了么</h1>
        <div class="subtitle">唯有爱和美食不可辜负</div>

        <button class="btn btn-secondary" id="guestBtn">🍚 游客浏览（无需注册）</button>

        <div class="divider">
            <div class="divider-line"></div>
            <span>使用手机号登录</span>
            <div class="divider-line"></div>
        </div>

        <div class="input-group">
            <input type="tel" id="phone" placeholder="手机号（11位数字）" autocomplete="tel">
        </div>
        <div class="input-group">
            <input type="password" id="password" placeholder="密码（至少6位）" autocomplete="new-password">
        </div>
        <div class="forgot-link"><a id="forgotPwdLink">忘记密码？</a></div>
        <button class="btn btn-primary" id="loginBtn">登录/注册</button>
        <div id="loginMessage" class="message" style="background: transparent; padding: 0.5rem 0 0;"></div>
    </div>

    <div id="forgotModal" class="modal">
        <div class="modal-content">
            <h3 style="margin-bottom: 1rem;">找回密码</h3>
            <input type="tel" id="resetPhone" placeholder="注册手机号">
            <button class="btn btn-primary" id="sendResetLinkBtn">发送重置邮件</button>
            <button class="btn btn-secondary" style="margin-top: 0.5rem;" onclick="closeModal('forgotModal')">取消</button>
            <div id="resetMessage" class="message" style="margin-top: 0.5rem;"></div>
        </div>
    </div>

    <script>
        // Supabase 配置（请替换）
        const SUPABASE_URL = 'https://your-project.supabase.co';
        const SUPABASE_ANON_KEY = 'your-anon-key';

        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        const loginMsgDiv = document.getElementById('loginMessage');
        const resetMsgDiv = document.getElementById('resetMessage');

        function showMessage(div, text, isError = false) {
            div.innerHTML = text;
            div.style.color = isError ? '#d9534f' : '#5a3e2b';
            setTimeout(() => { if (div.innerHTML === text) div.innerHTML = ''; }, 4000);
        }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        function showModal(id) { document.getElementById(id).style.display = 'flex'; }

        // 把手机号转换成唯一邮箱格式（用于 Supabase Auth 的 email 字段）
        function phoneToEmail(phone) {
            // 确保格式统一：+86 开头
            let clean = phone.replace(/\s+/g, '');
            if (!clean.startsWith('+86')) {
                if (clean.startsWith('86')) clean = '+' + clean;
                else clean = '+86' + clean;
            }
            // 转换为邮箱：+8613800138000@phone.local
            return clean + '@phone.local';
        }

        // 发送重置密码邮件（通过手机号对应的邮箱）
        async function sendPasswordResetEmail() {
            const phone = document.getElementById('resetPhone').value.trim();
            if (!phone) { showMessage(resetMsgDiv, '请输入手机号', true); return; }
            const fakeEmail = phoneToEmail(phone);
            const btn = document.getElementById('sendResetLinkBtn');
            btn.disabled = true;
            btn.innerText = '发送中...';
            try {
                const { error } = await supabase.auth.resetPasswordForEmail(fakeEmail, {
                    redirectTo: window.location.origin + '/reset-password.html'
                });
                if (error) throw error;
                showMessage(resetMsgDiv, '重置邮件已发送，请查收邮箱（垃圾箱可能有）');
                setTimeout(() => closeModal('forgotModal'), 2000);
            } catch (err) {
                console.error(err);
                let userMsg = '发送失败，请稍后重试';
                if (err.message.includes('User not found')) {
                    userMsg = '该手机号尚未注册，请先注册。';
                }
                showMessage(resetMsgDiv, userMsg, true);
            } finally { btn.disabled = false; btn.innerText = '发送重置邮件'; }
        }

        // 手机号登录/注册
        async function emailLogin() {
            const phone = document.getElementById('phone').value.trim();
            const password = document.getElementById('password').value;
            if (!phone || !password) { showMessage(loginMsgDiv, '请输入手机号和密码', true); return; }
            if (password.length < 6) { showMessage(loginMsgDiv, '密码至少需要6位', true); return; }

            const email = phoneToEmail(phone);
            const btn = document.getElementById('loginBtn');
            btn.disabled = true;
            btn.innerText = '处理中...';

            try {
                // 尝试登录
                const { data, error } = await supabase.auth.signInWithPassword({ email, password });
                if (error) throw error;
                showMessage(loginMsgDiv, '登录成功，正在跳转...');
                setTimeout(() => { window.location.href = '基础信息采集页.html'; }, 800);
            } catch (err) {
                console.error(err);
                if (err.message.includes('Invalid login credentials')) {
                    const confirmReg = window.confirm('该手机号尚未注册，是否立即注册？');
                    if (confirmReg) {
                        try {
                            // 注册新用户
                            const { error: signUpError } = await supabase.auth.signUp({ email, password });
                            if (signUpError) throw signUpError;
                            // 注册成功后自动创建 profiles 记录（后续页面会填充）
                            showMessage(loginMsgDiv, '注册成功，正在跳转...');
                            setTimeout(() => { window.location.href = '基础信息采集页.html'; }, 800);
                        } catch (regErr) {
                            showMessage(loginMsgDiv, '注册失败：' + regErr.message, true);
                        }
                    } else {
                        showMessage(loginMsgDiv, '请先注册账号', true);
                    }
                } else {
                    showMessage(loginMsgDiv, '手机号或密码错误', true);
                }
            } finally { btn.disabled = false; btn.innerText = '登录/注册'; }
        }

        // 游客登录（匿名）
        async function guestLogin() {
            try {
                const { error } = await supabase.auth.signInAnonymously();
                if (error) throw error;
                showMessage(loginMsgDiv, '游客模式，正在进入...');
                setTimeout(() => { window.location.href = '基础信息采集页.html'; }, 800);
            } catch (err) {
                showMessage(loginMsgDiv, '游客模式不可用，请稍后重试', true);
            }
        }

        document.getElementById('guestBtn').addEventListener('click', guestLogin);
        document.getElementById('loginBtn').addEventListener('click', emailLogin);
        document.getElementById('forgotPwdLink').addEventListener('click', () => showModal('forgotModal'));
        document.getElementById('sendResetLinkBtn').addEventListener('click', sendPasswordResetEmail);
    </script>
</body>
</html>
