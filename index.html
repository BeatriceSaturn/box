<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>吃了么 - 登录</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #fef9e8;
      font-family: -apple-system, "PingFang SC", "Noto Sans SC", system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .container {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 2rem 1.5rem;
    }
    .logo {
      text-align: center;
      margin-bottom: 2rem;
    }
    .logo-icon {
      background: #ffd6b0;
      width: 72px;
      height: 72px;
      border-radius: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1rem;
    }
    .logo-icon svg {
      width: 40px;
      height: 40px;
      stroke: #e67e22;
      stroke-width: 1.5;
    }
    h1 { font-size: 2rem; font-weight: 700; color: #5a3e2b; }
    .sub { color: #a07a5c; margin-top: 0.5rem; font-size: 0.9rem; }
    .btn {
      width: 100%;
      padding: 0.9rem;
      border-radius: 48px;
      border: 1px solid #e2d4c8;
      background: white;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      font-size: 1rem;
      font-weight: 500;
      color: #5a3e2b;
      cursor: pointer;
      margin-bottom: 1rem;
      transition: all 0.2s;
    }
    .btn:hover { background: #fff5eb; transform: translateY(-1px); }
    .divider {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin: 1.5rem 0;
      color: #c0a080;
      font-size: 0.8rem;
    }
    .divider-line { flex: 1; height: 1px; background: #e2d4c8; }
    .info {
      margin-top: 2rem;
      background: #fff2e6;
      padding: 1rem;
      border-radius: 24px;
      font-size: 0.8rem;
      color: #a07a5c;
    }
    footer {
      text-align: center;
      padding: 1rem;
      font-size: 0.7rem;
      color: #c0a080;
    }
    a { color: #e67e22; text-decoration: none; }
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }
    .modal-content {
      background: white;
      padding: 1.5rem;
      border-radius: 2rem;
      width: 85%;
      max-width: 320px;
      text-align: center;
    }
    .modal-content input {
      width: 100%;
      padding: 0.7rem;
      margin: 0.5rem 0;
      border: 1px solid #e2d4c8;
      border-radius: 2rem;
      font-size: 1rem;
    }
    .modal-content button {
      width: 100%;
      padding: 0.7rem;
      margin-top: 0.5rem;
      background: #e67e22;
      border: none;
      border-radius: 2rem;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }
    .modal-content button.secondary {
      background: #f0e4d4;
      color: #5a3e2b;
    }
    .recaptcha-container { margin: 1rem 0; }
  </style>
  <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore-compat.js"></script>
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyCVdUzsAMepg1knrDg4ID7tM3xb_0ILyPM",
      authDomain: "beatricesaturn-6ff7e.firebaseapp.com",
      projectId: "beatricesaturn-6ff7e",
      storageBucket: "beatricesaturn-6ff7e.firebasestorage.app",
      messagingSenderId: "607338984635",
      appId: "1:607338984635:web:a4b3668715462a4d0ca59e",
      measurementId: "G-L2R10QZZL9"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    function goToProfile() { window.location.href = '基础信息采集页.html'; }

    // 邮箱登录
    function showEmailModal() {
      document.getElementById('emailModal').style.display = 'flex';
      document.getElementById('emailInput').value = '';
      document.getElementById('passwordInput').value = '';
    }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }
    async function emailLogin() {
      const email = document.getElementById('emailInput').value.trim();
      const password = document.getElementById('passwordInput').value;
      if (!email || !password) { alert('请输入邮箱和密码'); return; }
      try {
        await auth.signInWithEmailAndPassword(email, password);
        alert('登录成功');
        closeModal('emailModal');
        goToProfile();
      } catch (error) {
        if (error.code === 'auth/user-not-found') {
          if (confirm('没有账号，是否立即注册？')) {
            try {
              await auth.createUserWithEmailAndPassword(email, password);
              alert('注册成功，已自动登录');
              closeModal('emailModal');
              goToProfile();
            } catch (regError) { alert('注册失败：' + regError.message); }
          }
        } else { alert('登录失败：' + error.message); }
      }
    }

    // 手机号登录
    let recaptchaVerifier = null;
    let confirmationResult = null;
    function showPhoneModal() {
      document.getElementById('phoneModal').style.display = 'flex';
      document.getElementById('phoneNumber').value = '';
      document.getElementById('verificationCode').value = '';
      document.getElementById('codeSection').style.display = 'none';
      document.getElementById('sendCodeBtn').style.display = 'block';
      document.getElementById('verifyCodeBtn').style.display = 'none';
      if (recaptchaVerifier) recaptchaVerifier.clear();
      recaptchaVerifier = new firebase.auth.RecaptchaVerifier('recaptcha-container', { size: 'invisible', callback: () => {} });
    }
    async function sendVerificationCode() {
      let phone = document.getElementById('phoneNumber').value.trim();
      if (!phone) { alert('请输入手机号'); return; }
      if (!phone.startsWith('+')) phone = '+86' + phone;
      if (!/^\+86\d{11}$/.test(phone)) { alert('请输入有效的中国大陆手机号（11位数字）'); return; }
      try {
        confirmationResult = await auth.signInWithPhoneNumber(phone, recaptchaVerifier);
        alert('验证码已发送');
        document.getElementById('codeSection').style.display = 'block';
        document.getElementById('sendCodeBtn').style.display = 'none';
        document.getElementById('verifyCodeBtn').style.display = 'block';
      } catch (error) {
        alert('发送验证码失败：' + error.message);
        recaptchaVerifier.render();
      }
    }
    async function verifyCodeAndLogin() {
      const code = document.getElementById('verificationCode').value.trim();
      if (!code) { alert('请输入验证码'); return; }
      try {
        await confirmationResult.confirm(code);
        alert('登录成功');
        closeModal('phoneModal');
        goToProfile();
      } catch (error) { alert('验证失败：' + error.message); }
    }

    // 匿名登录
    async function guestLogin() {
      try {
        await auth.signInAnonymously();
        goToProfile();
      } catch (error) { alert('登录失败，请检查网络后重试。建议使用邮箱或手机号登录。'); }
    }

    window.onclick = function(event) {
      if (event.target.classList.contains('modal')) event.target.style.display = 'none';
    };
  </script>
</head>
<body>
  <div class="container">
    <div class="logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
          <path d="m16 2-2.3 2.3a3 3 0 0 0 0 4.2l1.8 1.8a3 3 0 0 0 4.2 0L22 8"/>
          <path d="M15 15 3.3 3.3a4.2 4.2 0 0 0 0 6l7.3 7.3c.7.7 2 .7 2.8 0L15 15Zm0 0 7 7"/>
          <path d="m2.1 21.8 6.4-6.3"/>
          <path d="m19 5-7 7"/>
        </svg>
      </div>
      <h1>吃了么</h1>
      <p class="sub">规律饮食，健康生活。<br>与家人朋友一起，养成好好吃饭的习惯。</p>
    </div>
    <div>
      <button class="btn" id="emailBtn"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m22 7-8.991 5.727a2 2 0 0 1-2.009 0L2 7"/><rect x="2" y="4" width="20" height="16" rx="2"/></svg>邮箱登录</button>
      <button class="btn" id="phoneBtn"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="2" width="14" height="20" rx="2" ry="2"/><path d="M12 18h.01"/></svg>手机号登录</button>
      <div class="divider"><span class="divider-line"></span><span>或</span><span class="divider-line"></span></div>
      <button class="btn" id="guestBtn" style="background:transparent;">游客浏览</button>
      <div class="info"><strong>首次登录？</strong><br>我们会引导您完成个人档案设置，为您提供个性化的饮食建议。</div>
    </div>
  </div>
  <footer>登录即表示您同意 <a href="#">用户协议</a> 和 <a href="#">隐私政策</a></footer>

  <!-- 邮箱登录模态框 -->
  <div id="emailModal" class="modal">
    <div class="modal-content">
      <h3>邮箱登录</h3>
      <input type="email" id="emailInput" placeholder="电子邮箱">
      <input type="password" id="passwordInput" placeholder="密码">
      <button id="confirmEmailBtn">登录 / 注册</button>
      <button class="secondary" onclick="closeModal('emailModal')">取消</button>
    </div>
  </div>

  <!-- 手机号登录模态框 -->
  <div id="phoneModal" class="modal">
    <div class="modal-content">
      <h3>手机号登录</h3>
      <input type="tel" id="phoneNumber" placeholder="手机号 (例如 13812345678)">
      <div id="recaptcha-container" class="recaptcha-container"></div>
      <button id="sendCodeBtn" onclick="sendVerificationCode()">发送验证码</button>
      <div id="codeSection" style="display:none;">
        <input type="text" id="verificationCode" placeholder="短信验证码">
        <button id="verifyCodeBtn" onclick="verifyCodeAndLogin()">验证并登录</button>
      </div>
      <button class="secondary" onclick="closeModal('phoneModal')">取消</button>
    </div>
  </div>

  <script>
    document.getElementById('emailBtn').addEventListener('click', showEmailModal);
    document.getElementById('confirmEmailBtn').addEventListener('click', emailLogin);
    document.getElementById('phoneBtn').addEventListener('click', showPhoneModal);
    document.getElementById('guestBtn').addEventListener('click', guestLogin);
  </script>
</body>
</html>
