<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>膳食建议 - 吃了么</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #fef9e8;
      font-family: -apple-system, "PingFang SC", "Noto Sans SC", system-ui, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .header {
      position: sticky;
      top: 0;
      z-index: 50;
      width: 100%;
      background: #fff9f0;
      border-bottom: 1px solid #f0e4d4;
      padding: 0 1rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 56px;
    }
    .back-btn {
      width: 2.5rem;
      height: 2.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 0.5rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    .back-btn:hover { background: #f0e4d4; }
    .back-btn svg { width: 1.5rem; height: 1.5rem; stroke: #5a3e2b; stroke-width: 2.5; }
    .title {
      flex: 1;
      text-align: center;
      font-size: 1rem;
      font-weight: 600;
      color: #5a3e2b;
    }
    .main-content {
      flex: 1;
      overflow-y: auto;
      padding: 1rem;
      padding-bottom: 80px;
      scrollbar-width: thin;
    }
    .card {
      background: white;
      border-radius: 1rem;
      border: 1px solid #f0e4d4;
      padding: 1.25rem;
      margin-bottom: 1rem;
    }
    .section-title {
      font-size: 1rem;
      font-weight: 600;
      color: #5a3e2b;
      margin-bottom: 0.75rem;
    }
    .flex-between {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .metrics-row {
      display: flex;
      gap: 1rem;
      margin-top: 0.75rem;
      padding-top: 0.75rem;
      border-top: 1px solid #f0e4d4;
    }
    .metric-item {
      flex: 1;
      text-align: center;
    }
    .metric-label {
      font-size: 0.7rem;
      color: #a07a5c;
    }
    .metric-value {
      font-size: 1.2rem;
      font-weight: 700;
      color: #e67e22;
    }
    .advice-item {
      display: flex;
      gap: 0.75rem;
      padding: 0.75rem;
      background: #fffbf5;
      border-radius: 0.75rem;
      margin-bottom: 0.75rem;
      border-left: 3px solid #e67e22;
    }
    .advice-icon svg { width: 1.2rem; height: 1.2rem; stroke: #e67e22; }
    .advice-content { flex: 1; }
    .advice-title { font-weight: 600; font-size: 0.85rem; margin-bottom: 0.2rem; }
    .advice-desc { font-size: 0.75rem; color: #5a3e2b; line-height: 1.4; }
    .nutrition-card {
      background: #fffbf5;
      border-radius: 0.75rem;
      padding: 0.75rem;
      margin-bottom: 0.75rem;
    }
    .nutrition-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 0.5rem;
    }
    .nutrition-name {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-weight: 600;
      font-size: 0.85rem;
    }
    .nutrition-percent {
      font-weight: 600;
      color: #e67e22;
    }
    .progress-bar {
      height: 0.4rem;
      background: #f0e4d4;
      border-radius: 1rem;
      overflow: hidden;
      margin-bottom: 0.5rem;
    }
    .progress-fill {
      height: 100%;
      border-radius: 1rem;
      width: 0%;
    }
    .nutrition-tip {
      font-size: 0.7rem;
      color: #a07a5c;
      margin-top: 0.5rem;
      padding-top: 0.5rem;
      border-top: 1px solid #f0e4d4;
    }
    .collapsible {
      margin-bottom: 1rem;
    }
    .collapsible-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      padding: 0.5rem 0;
    }
    .collapsible-content {
      display: none;
      margin-top: 0.5rem;
    }
    .collapsible-content.open {
      display: block;
    }
    .recipe-item, .tip-item {
      background: #fffbf5;
      border-radius: 0.75rem;
      padding: 0.75rem;
      margin-bottom: 0.5rem;
    }
    .recipe-title {
      font-weight: 600;
      margin-bottom: 0.25rem;
    }
    .action-buttons {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: linear-gradient(to top, #fef9e8 80%, transparent);
      padding: 1rem;
      display: flex;
      gap: 0.75rem;
      z-index: 20;
    }
    .btn-outline {
      flex: 1;
      background: white;
      border: 1px solid #e2d4c8;
      border-radius: 2rem;
      padding: 0.7rem;
      font-size: 0.85rem;
      font-weight: 500;
      color: #a07a5c;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      cursor: pointer;
    }
    .btn-primary {
      flex: 1;
      background: #e67e22;
      border: none;
      border-radius: 2rem;
      padding: 0.7rem;
      font-size: 0.85rem;
      font-weight: 500;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      cursor: pointer;
    }
    .btn-outline:active, .btn-primary:active { transform: scale(0.98); }
  </style>
  <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore-compat.js"></script>
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyCVdUzsAMepg1knrDg4ID7tM3xb_0ILyPM",
      authDomain: "beatricesaturn-6ff7e.firebaseapp.com",
      projectId: "beatricesaturn-6ff7e",
      storageBucket: "beatricesaturn-6ff7e.firebasestorage.app",
      messagingSenderId: "607338984635",
      appId: "1:607338984635:web:a4b3668715462a4d0ca59e",
      measurementId: "G-L2R10QZZL9"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    let currentUser = null;

    auth.onAuthStateChanged(user => {
      if (user) {
        currentUser = user;
        renderPage();
      } else {
        window.location.href = 'index.html';
      }
    });

    // 获取用户档案
    async function getUserProfile() {
      const doc = await db.collection('profiles').doc(currentUser.uid).get();
      return doc.exists ? doc.data() : null;
    }

    // 获取最近7天的饮食记录
    async function getRecentMeals() {
      const sevenDaysAgo = new Date();
      sevenDaysAgo.setDate(sevenDaysAgo.getDate() - 7);
      const snapshot = await db.collection('meals')
        .where('userId', '==', currentUser.uid)
        .where('createdAt', '>=', sevenDaysAgo)
        .get();
      return snapshot.docs.map(doc => doc.data());
    }

    // 计算平均热量
    function getAverageCalories(meals) {
      let total = 0;
      let count = 0;
      meals.forEach(m => {
        const kcal = parseInt(m.kcal);
        if (!isNaN(kcal) && kcal > 0) {
          total += kcal;
          count++;
        }
      });
      return count > 0 ? Math.round(total / count) : 0;
    }

    // 根据BMI获取状态和建议
    function getBMIInfo(bmi) {
      if (bmi < 18.5) return { status: '偏瘦', advice: '体重偏轻，建议适当增加营养摄入。', habitAdvice: '少食多餐，增加优质蛋白和健康脂肪。' };
      if (bmi < 24) return { status: '健康', advice: '当前BMI处于相对健康区间。', habitAdvice: '保持规律饮食与适量活动，继续稳定作息。' };
      if (bmi < 28) return { status: '超重', advice: '体重超标，注意饮食控制和运动。', habitAdvice: '减少高热量食物，增加蔬菜和全谷物，每天坚持30分钟有氧运动。' };
      return { status: '肥胖', advice: '体重偏高，建议制定科学减重计划。', habitAdvice: '控制总热量摄入，定期监测体重，咨询营养师。' };
    }

    // 模拟营养分析（基于饮食记录的种类数量，简单估算）
    function getNutritionAnalysis(meals) {
      // 真实场景中需要解析食物名称的营养成分，这里简单用记录数量模拟
      const totalMeals = meals.length;
      // 假设每餐蛋白质、纤维等基础值，随着记录增多而改善
      const proteinPercent = Math.min(95, 60 + totalMeals);
      const fiberPercent = Math.min(90, 50 + totalMeals);
      const calciumPercent = Math.min(85, 45 + totalMeals);
      const ironPercent = Math.min(95, 65 + totalMeals);
      return { proteinPercent, fiberPercent, calciumPercent, ironPercent };
    }

    // 推荐食谱
    const recipes = [
      { name: '燕麦酸奶碗', desc: '即食燕麦+无糖酸奶+蓝莓+核桃，5分钟搞定', kcal: 320 },
      { name: '番茄鸡蛋荞麦面', desc: '荞麦面+番茄炒蛋+青菜，均衡一餐', kcal: 480 },
      { name: '鸡胸肉沙拉', desc: '生菜+鸡胸肉+牛油果+油醋汁', kcal: 390 }
    ];

    // 饮食小贴士
    const tips = [
      '吃饭时细嚼慢咽，每口咀嚼20次以上',
      '餐前喝一杯水，增加饱腹感',
      '晚餐尽量在睡前3小时完成',
      '每周吃2次深海鱼，补充Omega-3'
    ];

    async function renderPage() {
      const profile = await getUserProfile();
      const meals = await getRecentMeals();
      const avgCalories = getAverageCalories(meals);
      let bmi = null, bmiInfo = null;
      if (profile && profile.height && profile.weight) {
        const heightM = profile.height / 100;
        bmi = (profile.weight / (heightM * heightM)).toFixed(1);
        bmiInfo = getBMIInfo(bmi);
      } else {
        bmiInfo = { status: '未知', advice: '请先完善个人信息', habitAdvice: '完善信息后可获得更精准建议' };
      }
      const nutrition = getNutritionAnalysis(meals);
      // 建议目标热量（基于BMI状态）
      let targetCalories = 2000;
      if (bmiInfo.status === '偏瘦') targetCalories = 2200;
      else if (bmiInfo.status === '超重' || bmiInfo.status === '肥胖') targetCalories = 1800;

      const mainAdvice = bmiInfo.advice;
      const energyAdvice = avgCalories < 1500 ? '能量摄入偏低，建议增加健康加餐' : (avgCalories > 2500 ? '能量摄入偏高，注意控制高热量食物' : '能量摄入适中，继续保持');
      const habitAdvice = bmiInfo.habitAdvice;

      // 营养卡片HTML
      const nutritionHtml = `
        <div class="nutrition-card">
          <div class="nutrition-header">
            <div class="nutrition-name"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#f59e0b" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></svg> 蛋白质</div>
            <div class="nutrition-percent">${nutrition.proteinPercent}%</div>
          </div>
          <div class="progress-bar"><div class="progress-fill" style="width:${nutrition.proteinPercent}%; background:#f59e0b;"></div></div>
          <div class="nutrition-tip">💡 建议每餐补充优质蛋白，如鸡蛋、鱼类、豆制品。</div>
        </div>
        <div class="nutrition-card">
          <div class="nutrition-header">
            <div class="nutrition-name"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#f59e0b" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></svg> 膳食纤维</div>
            <div class="nutrition-percent">${nutrition.fiberPercent}%</div>
          </div>
          <div class="progress-bar"><div class="progress-fill" style="width:${nutrition.fiberPercent}%; background:#f59e0b;"></div></div>
          <div class="nutrition-tip">💡 增加蔬菜和全谷物摄入，促进消化健康。</div>
        </div>
        <div class="nutrition-card">
          <div class="nutrition-header">
            <div class="nutrition-name"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="2"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3"/><path d="M12 9v4"/><path d="M12 17h.01"/></svg> 钙</div>
            <div class="nutrition-percent">${nutrition.calciumPercent}%</div>
          </div>
          <div class="progress-bar"><div class="progress-fill" style="width:${nutrition.calciumPercent}%; background:#ef4444;"></div></div>
          <div class="nutrition-tip">💡 建议每天补充乳制品或钙强化食品。</div>
        </div>
        <div class="nutrition-card">
          <div class="nutrition-header">
            <div class="nutrition-name"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#10b981" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></svg> 铁</div>
            <div class="nutrition-percent">${nutrition.ironPercent}%</div>
          </div>
          <div class="progress-bar"><div class="progress-fill" style="width:${nutrition.ironPercent}%; background:#10b981;"></div></div>
          <div class="nutrition-tip">💡 保持当前摄入水平，继续食用红肉和绿叶蔬菜。</div>
        </div>
      `;

      // 推荐食谱折叠内容
      const recipesHtml = recipes.map(r => `
        <div class="recipe-item">
          <div class="recipe-title">🍽️ ${r.name}</div>
          <div style="font-size:0.75rem; color:#a07a5c;">${r.desc} · ${r.kcal}kcal</div>
        </div>
      `).join('');

      // 小贴士折叠内容
      const tipsHtml = tips.map(t => `<div class="tip-item">💡 ${t}</div>`).join('');

      const fullHtml = `
        <div class="card">
          <div class="flex-between">
            <div class="flex-between" style="gap:0.5rem;">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#e67e22" stroke-width="2"><path d="M11.017 2.814a1 1 0 0 1 1.966 0l1.051 5.558a2 2 0 0 0 1.594 1.594l5.558 1.051a1 1 0 0 1 0 1.966l-5.558 1.051a2 2 0 0 0-1.594 1.594l-1.051 5.558a1 1 0 0 1-1.966 0l-1.051-5.558a2 2 0 0 0-1.594-1.594l-5.558-1.051a1 1 0 0 1 0-1.966l5.558-1.051a2 2 0 0 0 1.594-1.594z"/><path d="M20 2v4"/><path d="M22 4h-4"/><circle cx="4" cy="20" r="2"/></svg>
              <h2 class="section-title" style="margin-bottom:0;">您的个性化膳食建议</h2>
            </div>
          </div>
          <p class="advice-desc" style="margin-top:0.5rem;">${mainAdvice}</p>
          <div class="metrics-row">
            <div class="metric-item"><div class="metric-label">当前平均热量</div><div class="metric-value">${avgCalories || '--'} kcal</div></div>
            <div class="metric-item"><div class="metric-label">建议目标热量</div><div class="metric-value">${targetCalories} kcal</div></div>
          </div>
        </div>

        <div class="advice-item">
          <div class="advice-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 14a1 1 0 0 1-.78-1.63l9.9-10.2a.5.5 0 0 1 .86.46l-1.92 6.02A1 1 0 0 0 13 10h7a1 1 0 0 1 .78 1.63l-9.9 10.2a.5.5 0 0 1-.86-.46l1.92-6.02A1 1 0 0 0 11 14z"/></svg></div>
          <div class="advice-content"><div class="advice-title">能量提升建议</div><div class="advice-desc">${energyAdvice}</div></div>
        </div>
        <div class="advice-item">
          <div class="advice-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.801 10A10 10 0 1 1 17 3.335"/><path d="m9 11 3 3L22 4"/></svg></div>
          <div class="advice-content"><div class="advice-title">日常习惯建议</div><div class="advice-desc">${habitAdvice}</div></div>
        </div>

        <div class="card">
          <div class="collapsible-header" id="nutritionHeader">
            <h3 class="section-title" style="margin-bottom:0;">营养摄入分析</h3>
            <svg id="nutritionArrow" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#a07a5c" stroke-width="2" style="transform:rotate(180deg); transition:0.2s;"><path d="m6 9 6 6 6-6"/></svg>
          </div>
          <div id="nutritionContent" class="collapsible-content open">
            ${nutritionHtml}
          </div>
        </div>

        <div class="card">
          <div class="collapsible-header" id="recipeHeader">
            <h3 class="section-title" style="margin-bottom:0;">推荐食谱</h3>
            <svg id="recipeArrow" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#a07a5c" stroke-width="2"><path d="m6 9 6 6 6-6"/></svg>
          </div>
          <div id="recipeContent" class="collapsible-content">
            ${recipesHtml}
          </div>
        </div>

        <div class="card">
          <div class="collapsible-header" id="tipsHeader">
            <h3 class="section-title" style="margin-bottom:0;">饮食小贴士</h3>
            <svg id="tipsArrow" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#a07a5c" stroke-width="2"><path d="m6 9 6 6 6-6"/></svg>
          </div>
          <div id="tipsContent" class="collapsible-content">
            ${tipsHtml}
          </div>
        </div>
      `;

      document.getElementById('mainContent').innerHTML = fullHtml;

      // 折叠功能
      function toggleCollapse(headerId, contentId, arrowId) {
        const header = document.getElementById(headerId);
        const content = document.getElementById(contentId);
        const arrow = document.getElementById(arrowId);
        if (!header || !content) return;
        header.addEventListener('click', () => {
          content.classList.toggle('open');
          if (arrow) {
            arrow.style.transform = content.classList.contains('open') ? 'rotate(180deg)' : 'rotate(0deg)';
          }
        });
      }
      toggleCollapse('nutritionHeader', 'nutritionContent', 'nutritionArrow');
      toggleCollapse('recipeHeader', 'recipeContent', 'recipeArrow');
      toggleCollapse('tipsHeader', 'tipsContent', 'tipsArrow');

      // 默认折叠食谱和贴士
      document.getElementById('recipeContent')?.classList.remove('open');
      document.getElementById('tipsContent')?.classList.remove('open');
      const recipeArrow = document.getElementById('recipeArrow');
      const tipsArrow = document.getElementById('tipsArrow');
      if (recipeArrow) recipeArrow.style.transform = 'rotate(0deg)';
      if (tipsArrow) tipsArrow.style.transform = 'rotate(0deg)';
    }

    // 底部按钮事件
    document.getElementById('favoriteBtn')?.addEventListener('click', () => alert('收藏功能开发中'));
    document.getElementById('shareBtn')?.addEventListener('click', () => alert('分享功能开发中'));
    document.getElementById('nextMealBtn')?.addEventListener('click', () => window.location.href = '打卡详情页.html');
    document.getElementById('backBtn')?.addEventListener('click', () => window.location.href = '饮食管理首页.html');
  </script>
</head>
<body>
  <header class="header">
    <div class="back-btn" id="backBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M15 18l-6-6 6-6" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <div class="title">膳食建议</div>
    <div class="right-placeholder" style="width:2.5rem;"></div>
  </header>

  <main class="main-content" id="mainContent">
    <div style="text-align: center; padding: 2rem;">加载中...</div>
  </main>

  <div class="action-buttons">
    <button class="btn-outline" id="favoriteBtn">⭐ 收藏</button>
    <button class="btn-outline" id="shareBtn">📤 分享</button>
    <button class="btn-primary" id="nextMealBtn">➕ 记录下一餐</button>
  </div>

  <script>
    // 绑定底部按钮（由于动态渲染，需要等待页面加载后绑定）
    document.getElementById('favoriteBtn').addEventListener('click', () => alert('收藏功能开发中'));
    document.getElementById('shareBtn').addEventListener('click', () => alert('分享功能开发中'));
    document.getElementById('nextMealBtn').addEventListener('click', () => window.location.href = '打卡详情页.html');
    document.getElementById('backBtn').addEventListener('click', () => window.location.href = '饮食管理首页.html');
  </script>
</body>
</html>
