<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>膳食建议 - 吃了么</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #fef9e8;
      font-family: -apple-system, "PingFang SC", "Noto Sans SC", system-ui, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    /* 头部 */
    .header {
      position: sticky;
      top: 0;
      z-index: 50;
      width: 100%;
      background: #fff9f0;
      border-bottom: 1px solid #f0e4d4;
      padding: 0 1rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 56px;
    }
    .back-btn {
      width: 2.5rem;
      height: 2.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 0.5rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    .back-btn:hover { background: #f0e4d4; }
    .back-btn svg { width: 1.5rem; height: 1.5rem; stroke: #5a3e2b; stroke-width: 2.5; }
    .title {
      flex: 1;
      text-align: center;
      font-size: 1rem;
      font-weight: 600;
      color: #5a3e2b;
    }
    /* 主内容滚动区 */
    .main-content {
      flex: 1;
      overflow-y: auto;
      padding: 1rem;
      padding-bottom: 80px;
      scrollbar-width: thin;
    }
    /* 卡片样式 */
    .card {
      background: white;
      border-radius: 1rem;
      border: 1px solid #f0e4d4;
      padding: 1.25rem;
      margin-bottom: 1rem;
    }
    .section-title {
      font-size: 1rem;
      font-weight: 600;
      color: #5a3e2b;
      margin-bottom: 0.75rem;
    }
    .flex-between {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    /* 指标卡片 */
    .metrics-row {
      display: flex;
      gap: 1rem;
      margin-top: 0.75rem;
      padding-top: 0.75rem;
      border-top: 1px solid #f0e4d4;
    }
    .metric-item {
      flex: 1;
      text-align: center;
    }
    .metric-label {
      font-size: 0.7rem;
      color: #a07a5c;
    }
    .metric-value {
      font-size: 1.2rem;
      font-weight: 700;
      color: #e67e22;
    }
    /* 建议条目 */
    .advice-item {
      display: flex;
      gap: 0.75rem;
      padding: 0.75rem;
      background: #fffbf5;
      border-radius: 0.75rem;
      margin-bottom: 0.75rem;
      border-left: 3px solid #e67e22;
    }
    .advice-icon svg { width: 1.2rem; height: 1.2rem; stroke: #e67e22; }
    .advice-content { flex: 1; }
    .advice-title { font-weight: 600; font-size: 0.85rem; margin-bottom: 0.2rem; }
    .advice-desc { font-size: 0.75rem; color: #5a3e2b; line-height: 1.4; }
    /* 营养卡片 */
    .nutrition-card {
      background: #fffbf5;
      border-radius: 0.75rem;
      padding: 0.75rem;
      margin-bottom: 0.75rem;
    }
    .nutrition-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 0.5rem;
    }
    .nutrition-name {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-weight: 600;
      font-size: 0.85rem;
    }
    .nutrition-percent {
      font-weight: 600;
      color: #e67e22;
    }
    .progress-bar {
      height: 0.4rem;
      background: #f0e4d4;
      border-radius: 1rem;
      overflow: hidden;
      margin-bottom: 0.5rem;
    }
    .progress-fill {
      height: 100%;
      border-radius: 1rem;
      width: 0%;
    }
    .nutrition-tip {
      font-size: 0.7rem;
      color: #a07a5c;
      margin-top: 0.5rem;
      padding-top: 0.5rem;
      border-top: 1px solid #f0e4d4;
    }
    /* 折叠区域 */
    .collapsible {
      margin-bottom: 1rem;
    }
    .collapsible-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      padding: 0.5rem 0;
    }
    .collapsible-content {
      display: none;
      margin-top: 0.5rem;
    }
    .collapsible-content.open {
      display: block;
    }
    .recipe-item, .tip-item {
      background: #fffbf5;
      border-radius: 0.75rem;
      padding: 0.75rem;
      margin-bottom: 0.5rem;
    }
    .recipe-title {
      font-weight: 600;
      margin-bottom: 0.25rem;
    }
    /* 底部按钮 */
    .action-buttons {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: linear-gradient(to top, #fef9e8 80%, transparent);
      padding: 1rem;
      display: flex;
      gap: 0.75rem;
      z-index: 20;
    }
    .btn-outline {
      flex: 1;
      background: white;
      border: 1px solid #e2d4c8;
      border-radius: 2rem;
      padding: 0.7rem;
      font-size: 0.85rem;
      font-weight: 500;
      color: #a07a5c;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      cursor: pointer;
    }
    .btn-primary {
      flex: 1;
      background: #e67e22;
      border: none;
      border-radius: 2rem;
      padding: 0.7rem;
      font-size: 0.85rem;
      font-weight: 500;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      cursor: pointer;
    }
    .btn-outline:active, .btn-primary:active { transform: scale(0.98); }
    /* 底部导航栏 */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #fff9f0;
      border-top: 1px solid #f0e4d4;
      display: flex;
      justify-content: space-around;
      padding: 0.5rem 1rem 1rem;
      z-index: 20;
      transform: translateY(100%);
      pointer-events: none;
    }
    /* 为了不遮挡底部按钮，实际页面不使用底部导航栏（因为已有固定操作栏），但保留样式以防万一 */
    .hide-nav { display: none; }
  </style>
</head>
<body>
  <header class="header">
    <div class="back-btn" id="backBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M15 18l-6-6 6-6" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <div class="title">膳食建议</div>
    <div class="right-placeholder" style="width:2.5rem;"></div>
  </header>

  <main class="main-content" id="mainContent">
    <div style="text-align: center; padding: 2rem;">加载中...</div>
  </main>

  <div class="action-buttons">
    <button class="btn-outline" id="favoriteBtn">⭐ 收藏</button>
    <button class="btn-outline" id="shareBtn">📤 分享</button>
    <button class="btn-primary" id="nextMealBtn">➕ 记录下一餐</button>
  </div>

  <script>
    // ---------- 辅助函数 ----------
    function getUserId() {
      let userId = localStorage.getItem('currentUserId');
      if (!userId) {
        userId = 'guest_' + Date.now();
        localStorage.setItem('currentUserId', userId);
      }
      return userId;
    }

    function getCheckins() {
      const userId = getUserId();
      const key = `checkins_${userId}`;
      const data = localStorage.getItem(key);
      return data ? JSON.parse(data) : {};
    }

    function getMealsLog() {
      const data = localStorage.getItem('mealsLog');
      return data ? JSON.parse(data) : [];
    }

    function getUserProfile() {
      const profile = localStorage.getItem('userProfile');
      return profile ? JSON.parse(profile) : null;
    }

    // 计算平均热量（最近7天）
    function getAverageCalories() {
      const meals = getMealsLog();
      const last7Days = new Date();
      last7Days.setDate(last7Days.getDate() - 7);
      let total = 0;
      let count = 0;
      for (const meal of meals) {
        const mealDate = meal.date || meal.timestamp?.slice(0,10);
        if (mealDate && new Date(mealDate) >= last7Days) {
          const kcal = parseInt(meal.kcal);
          if (!isNaN(kcal)) {
            total += kcal;
            count++;
          }
        }
      }
      return count > 0 ? Math.round(total / count) : 0;
    }

    // 获取BMI状态
    function getBMIStatus() {
      const profile = getUserProfile();
      if (!profile || !profile.height || !profile.weight) return 'unknown';
      const heightM = profile.height / 100;
      const bmi = profile.weight / (heightM * heightM);
      if (bmi < 18.5) return '偏瘦';
      if (bmi < 24) return '健康';
      if (bmi < 28) return '超重';
      return '肥胖';
    }

    // 模拟营养数据（基于用户打卡和饮食记录，可动态调整）
    function getNutritionData() {
      // 实际中可根据饮食记录计算，这里使用模拟数据并稍作随机变化
      const mealsLog = getMealsLog();
      const totalMeals = mealsLog.length;
      // 基础值，随记录数增加而改善
      const protein = Math.min(95, 65 + Math.floor(totalMeals / 5));
      const fiber = Math.min(90, 50 + Math.floor(totalMeals / 6));
      const calcium = Math.min(85, 55 + Math.floor(totalMeals / 8));
      const iron = Math.min(95, 70 + Math.floor(totalMeals / 4));
      return {
        protein: { current: Math.floor(protein * 0.75), target: 75, percent: Math.floor(protein * 0.75 / 75 * 100) },
        fiber: { current: Math.floor(fiber * 0.28), target: 25, percent: Math.floor(fiber * 0.28 / 25 * 100) },
        calcium: { current: Math.floor(calcium * 7.5), target: 800, percent: Math.floor(calcium * 7.5 / 800 * 100) },
        iron: { current: Math.floor(iron * 0.16), target: 15, percent: Math.floor(iron * 0.16 / 15 * 100) }
      };
    }

    // 推荐食谱
    const recipes = [
      { name: '燕麦酸奶碗', desc: '即食燕麦+无糖酸奶+蓝莓+核桃，5分钟搞定', kcal: 320 },
      { name: '番茄鸡蛋荞麦面', desc: '荞麦面+番茄炒蛋+青菜，均衡一餐', kcal: 480 },
      { name: '鸡胸肉沙拉', desc: '生菜+鸡胸肉+牛油果+油醋汁', kcal: 390 }
    ];

    // 饮食小贴士
    const tips = [
      '吃饭时细嚼慢咽，每口咀嚼20次以上',
      '餐前喝一杯水，增加饱腹感',
      '晚餐尽量在睡前3小时完成',
      '每周吃2次深海鱼，补充Omega-3'
    ];

    // 渲染主页面
    function renderPage() {
      const profile = getUserProfile();
      const avgCalories = getAverageCalories();
      const bmiStatus = getBMIStatus();
      const nutrition = getNutritionData();

      // 根据BMI状态生成个性化建议
      let mainAdvice = '';
      let energyAdvice = '';
      let habitAdvice = '';
      if (bmiStatus === '健康') {
        mainAdvice = '您的体重指标健康，建议保持规律饮食习惯，均衡营养摄入。';
        energyAdvice = '您的能量指数良好，继续保持规律的三餐节奏。';
        habitAdvice = '建议每日饮水1.5-2L，并在午餐和晚餐达到七分饱时及时停止进食，有助于长期保持健康体态。';
      } else if (bmiStatus === '偏瘦') {
        mainAdvice = '您的体重偏轻，建议适当增加优质蛋白和健康脂肪的摄入。';
        energyAdvice = '能量摄入略低，可适当增加加餐（如坚果、酸奶）。';
        habitAdvice = '建议少食多餐，每天增加1-2次健康加餐，避免空腹过久。';
      } else if (bmiStatus === '超重') {
        mainAdvice = '您的体重超标，建议控制总热量摄入，增加蔬菜和运动。';
        energyAdvice = '能量摄入偏高，注意减少高糖高脂食物。';
        habitAdvice = '建议每餐先吃蔬菜再吃主食，晚餐减少碳水比例。';
      } else {
        mainAdvice = '您的体重偏高，建议制定科学减重计划，咨询营养师。';
        energyAdvice = '能量摄入过多，需调整饮食结构。';
        habitAdvice = '建议戒掉含糖饮料，每周至少150分钟中等强度运动。';
      }

      // 建议目标热量（基于BMI状态）
      let targetCalories = 2000;
      if (bmiStatus === '偏瘦') targetCalories = 2200;
      else if (bmiStatus === '超重' || bmiStatus === '肥胖') targetCalories = 1800;

      // 构建营养卡片HTML
      const nutritionHtml = `
        <div class="nutrition-card">
          <div class="nutrition-header">
            <div class="nutrition-name">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#f59e0b" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></svg>
              蛋白质
            </div>
            <div class="nutrition-percent">${nutrition.protein.percent}%</div>
          </div>
          <div class="progress-bar"><div class="progress-fill" style="width:${nutrition.protein.percent}%; background:#f59e0b;"></div></div>
          <div class="flex-between"><span class="metric-label">${nutrition.protein.current}g</span><span class="metric-label">目标 ${nutrition.protein.target}g</span></div>
          <div class="nutrition-tip">💡 建议每餐补充优质蛋白，如鸡蛋、鱼类、豆制品。</div>
        </div>
        <div class="nutrition-card">
          <div class="nutrition-header">
            <div class="nutrition-name">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#f59e0b" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></svg>
              膳食纤维
            </div>
            <div class="nutrition-percent">${nutrition.fiber.percent}%</div>
          </div>
          <div class="progress-bar"><div class="progress-fill" style="width:${nutrition.fiber.percent}%; background:#f59e0b;"></div></div>
          <div class="flex-between"><span class="metric-label">${nutrition.fiber.current}g</span><span class="metric-label">目标 ${nutrition.fiber.target}g</span></div>
          <div class="nutrition-tip">💡 增加蔬菜和全谷物摄入，促进消化健康。</div>
        </div>
        <div class="nutrition-card">
          <div class="nutrition-header">
            <div class="nutrition-name">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="2"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3"/><path d="M12 9v4"/><path d="M12 17h.01"/></svg>
              钙
            </div>
            <div class="nutrition-percent">${nutrition.calcium.percent}%</div>
          </div>
          <div class="progress-bar"><div class="progress-fill" style="width:${nutrition.calcium.percent}%; background:#ef4444;"></div></div>
          <div class="flex-between"><span class="metric-label">${nutrition.calcium.current}mg</span><span class="metric-label">目标 ${nutrition.calcium.target}mg</span></div>
          <div class="nutrition-tip">💡 建议每天补充乳制品或钙强化食品。</div>
        </div>
        <div class="nutrition-card">
          <div class="nutrition-header">
            <div class="nutrition-name">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#10b981" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></svg>
              铁
            </div>
            <div class="nutrition-percent">${nutrition.iron.percent}%</div>
          </div>
          <div class="progress-bar"><div class="progress-fill" style="width:${nutrition.iron.percent}%; background:#10b981;"></div></div>
          <div class="flex-between"><span class="metric-label">${nutrition.iron.current}mg</span><span class="metric-label">目标 ${nutrition.iron.target}mg</span></div>
          <div class="nutrition-tip">💡 保持当前摄入水平，继续食用红肉和绿叶蔬菜。</div>
        </div>
      `;

      // 推荐食谱折叠内容
      const recipesHtml = recipes.map(r => `
        <div class="recipe-item">
          <div class="recipe-title">🍽️ ${r.name}</div>
          <div style="font-size:0.75rem; color:#a07a5c;">${r.desc} · ${r.kcal}kcal</div>
        </div>
      `).join('');

      // 小贴士折叠内容
      const tipsHtml = tips.map(t => `
        <div class="tip-item">💡 ${t}</div>
      `).join('');

      const fullHtml = `
        <div class="card">
          <div class="flex-between">
            <div class="flex-between" style="gap:0.5rem;">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#e67e22" stroke-width="2"><path d="M11.017 2.814a1 1 0 0 1 1.966 0l1.051 5.558a2 2 0 0 0 1.594 1.594l5.558 1.051a1 1 0 0 1 0 1.966l-5.558 1.051a2 2 0 0 0-1.594 1.594l-1.051 5.558a1 1 0 0 1-1.966 0l-1.051-5.558a2 2 0 0 0-1.594-1.594l-5.558-1.051a1 1 0 0 1 0-1.966l5.558-1.051a2 2 0 0 0 1.594-1.594z"/><path d="M20 2v4"/><path d="M22 4h-4"/><circle cx="4" cy="20" r="2"/></svg>
              <h2 class="section-title" style="margin-bottom:0;">您的个性化膳食建议</h2>
            </div>
          </div>
          <p class="advice-desc" style="margin-top:0.5rem;">${mainAdvice}</p>
          <div class="metrics-row">
            <div class="metric-item"><div class="metric-label">当前平均热量</div><div class="metric-value">${avgCalories || '--'} kcal</div></div>
            <div class="metric-item"><div class="metric-label">建议目标热量</div><div class="metric-value">${targetCalories} kcal</div></div>
          </div>
        </div>

        <div class="advice-item">
          <div class="advice-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 14a1 1 0 0 1-.78-1.63l9.9-10.2a.5.5 0 0 1 .86.46l-1.92 6.02A1 1 0 0 0 13 10h7a1 1 0 0 1 .78 1.63l-9.9 10.2a.5.5 0 0 1-.86-.46l1.92-6.02A1 1 0 0 0 11 14z"/></svg></div>
          <div class="advice-content"><div class="advice-title">能量提升建议</div><div class="advice-desc">${energyAdvice}</div></div>
        </div>
        <div class="advice-item">
          <div class="advice-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.801 10A10 10 0 1 1 17 3.335"/><path d="m9 11 3 3L22 4"/></svg></div>
          <div class="advice-content"><div class="advice-title">日常习惯建议</div><div class="advice-desc">${habitAdvice}</div></div>
        </div>

        <div class="card">
          <div class="collapsible-header" id="nutritionHeader">
            <h3 class="section-title" style="margin-bottom:0;">营养摄入分析</h3>
            <svg id="nutritionArrow" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#a07a5c" stroke-width="2" style="transform:rotate(180deg); transition:0.2s;"><path d="m6 9 6 6 6-6"/></svg>
          </div>
          <div id="nutritionContent" class="collapsible-content open">
            ${nutritionHtml}
          </div>
        </div>

        <div class="card">
          <div class="collapsible-header" id="recipeHeader">
            <h3 class="section-title" style="margin-bottom:0;">推荐食谱</h3>
            <svg id="recipeArrow" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#a07a5c" stroke-width="2"><path d="m6 9 6 6 6-6"/></svg>
          </div>
          <div id="recipeContent" class="collapsible-content">
            ${recipesHtml}
          </div>
        </div>

        <div class="card">
          <div class="collapsible-header" id="tipsHeader">
            <h3 class="section-title" style="margin-bottom:0;">饮食小贴士</h3>
            <svg id="tipsArrow" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#a07a5c" stroke-width="2"><path d="m6 9 6 6 6-6"/></svg>
          </div>
          <div id="tipsContent" class="collapsible-content">
            ${tipsHtml}
          </div>
        </div>
      `;

      document.getElementById('mainContent').innerHTML = fullHtml;

      // 折叠功能
      function toggleCollapse(headerId, contentId, arrowId) {
        const header = document.getElementById(headerId);
        const content = document.getElementById(contentId);
        const arrow = document.getElementById(arrowId);
        if (!header || !content) return;
        header.addEventListener('click', () => {
          content.classList.toggle('open');
          if (arrow) {
            arrow.style.transform = content.classList.contains('open') ? 'rotate(180deg)' : 'rotate(0deg)';
          }
        });
      }
      toggleCollapse('nutritionHeader', 'nutritionContent', 'nutritionArrow');
      toggleCollapse('recipeHeader', 'recipeContent', 'recipeArrow');
      toggleCollapse('tipsHeader', 'tipsContent', 'tipsArrow');

      // 默认打开营养分析，折叠食谱和贴士
      document.getElementById('recipeContent')?.classList.remove('open');
      document.getElementById('tipsContent')?.classList.remove('open');
      const recipeArrow = document.getElementById('recipeArrow');
      const tipsArrow = document.getElementById('tipsArrow');
      if (recipeArrow) recipeArrow.style.transform = 'rotate(0deg)';
      if (tipsArrow) tipsArrow.style.transform = 'rotate(0deg)';
    }

    // 返回按钮
    document.getElementById('backBtn').addEventListener('click', () => {
      window.location.href = '饮食管理首页.html';
    });

    // 底部按钮
    document.getElementById('favoriteBtn').addEventListener('click', () => {
      alert('收藏功能开发中，可保存当前建议到个人中心');
    });
    document.getElementById('shareBtn').addEventListener('click', () => {
      alert('分享功能开发中，可分享膳食建议给亲友');
    });
    document.getElementById('nextMealBtn').addEventListener('click', () => {
      window.location.href = '打卡详情页.html';
    });

    renderPage();
  </script>
</body>
</html>
