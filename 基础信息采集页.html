<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>完善信息 - 吃了么</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #fef9e8;
      font-family: -apple-system, "PingFang SC", "Noto Sans SC", system-ui, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem;
      background: #fff9f0;
      border-bottom: 1px solid #f0e4d4;
    }
    .back-btn {
      width: 2rem;
      height: 2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      border-radius: 50%;
    }
    .back-btn:hover { background: #f0e4d4; }
    .title { font-size: 1.1rem; font-weight: 600; color: #5a3e2b; }
    .main { flex: 1; overflow-y: auto; padding: 1rem; }
    .card {
      background: white;
      border-radius: 1rem;
      border: 1px solid #f0e4d4;
      padding: 1rem;
      margin-bottom: 1rem;
    }
    .form-group { margin-bottom: 1rem; }
    label { font-size: 0.85rem; font-weight: 500; color: #5a3e2b; display: block; margin-bottom: 0.25rem; }
    input {
      width: 100%;
      padding: 0.7rem;
      border: 1px solid #e2d4c8;
      border-radius: 0.75rem;
      font-size: 1rem;
      background: white;
    }
    .radio-group {
      display: flex;
      gap: 1rem;
      margin-top: 0.5rem;
    }
    .radio-group label {
      display: flex;
      align-items: center;
      gap: 0.3rem;
      font-weight: normal;
    }
    .bmi-result {
      background: #fff7f0;
      border-radius: 0.75rem;
      padding: 0.75rem;
      margin-top: 0.5rem;
    }
    .btn {
      width: 100%;
      background: #e67e22;
      border: none;
      border-radius: 2rem;
      padding: 0.8rem;
      font-size: 1rem;
      font-weight: 600;
      color: white;
      cursor: pointer;
      margin-top: 1rem;
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    // 你的 Supabase 配置
    const SUPABASE_URL = 'https://akxuloriodjnhgujonsr.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFreHVsb3Jpb2RqbmhndWpvbnNyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1ODM1ODIsImV4cCI6MjA5MjE1OTU4Mn0.Lb43TKoqLKAHab65Oyr9hFUFGygb9gofu05lkihw60w';

    // 创建客户端并挂载到 window 上，避免重复声明
    window.supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  </script>
</head>
<body>
  <div class="header">
    <div class="back-btn" id="backBtn">←</div>
    <div class="title">完善个人信息</div>
    <div style="width:2rem;"></div>
  </div>
  <div class="main">
    <div class="card">
      <div class="form-group">
        <label>性别</label>
        <div class="radio-group">
          <label><input type="radio" name="gender" value="female"> 女</label>
          <label><input type="radio" name="gender" value="male"> 男</label>
          <label><input type="radio" name="gender" value="other"> 其他</label>
        </div>
      </div>
      <div class="form-group">
        <label>年龄</label>
        <input type="number" id="age" placeholder="18-100" value="28">
      </div>
      <div class="form-group">
        <label>身高 (cm)</label>
        <input type="number" id="height" placeholder="100-250" value="165">
      </div>
      <div class="form-group">
        <label>体重 (kg)</label>
        <input type="number" id="weight" placeholder="20-200" value="55">
      </div>
      <div class="bmi-result" id="bmiResult"></div>
      <button class="btn" id="submitBtn">确认信息并继续</button>
    </div>
  </div>
  <script>
    function calculateBMI() {
      const h = parseFloat(document.getElementById('height').value);
      const w = parseFloat(document.getElementById('weight').value);
      if (h > 0 && w > 0) {
        const bmi = (w / ((h/100)**2)).toFixed(1);
        let status = '';
        if (bmi < 18.5) status = '偏瘦';
        else if (bmi < 24) status = '健康';
        else if (bmi < 28) status = '超重';
        else status = '肥胖';
        document.getElementById('bmiResult').innerHTML = `当前BMI: <strong>${bmi}</strong> (${status})`;
        return { bmi, status };
      }
      return null;
    }
    document.getElementById('height').addEventListener('input', calculateBMI);
    document.getElementById('weight').addEventListener('input', calculateBMI);
    calculateBMI();

    document.getElementById('submitBtn').addEventListener('click', async () => {
      const gender = document.querySelector('input[name="gender"]:checked')?.value || '';
      const age = parseInt(document.getElementById('age').value);
      const height = parseFloat(document.getElementById('height').value);
      const weight = parseFloat(document.getElementById('weight').value);
      if (!gender || !age || !height || !weight) {
        alert('请完整填写信息');
        return;
      }
      const bmiData = calculateBMI();

      // 使用 window.supabase 客户端
      const { data: { user }, error: userError } = await window.supabase.auth.getUser();
      if (userError || !user) {
        alert('请先登录（页面会自动登录，若失败请刷新重试）');
        return;
      }

      const profileData = {
        id: user.id,
        gender,
        age,
        height,
        weight,
        bmi: parseFloat(bmiData.bmi),
        updated_at: new Date()
      };

      const { error } = await window.supabase
        .from('profiles')
        .upsert(profileData);

      if (error) {
        console.error('保存失败:', error);
        alert('保存失败：' + error.message);
      } else {
        alert('信息保存成功！');
        window.location.href = '核心目标设定页.html';
      }
    });

    document.getElementById('backBtn').addEventListener('click', () => {
      window.location.href = 'index.html';
    });
  </script>
</body>
</html>
