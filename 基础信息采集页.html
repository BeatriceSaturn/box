<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>个人信息 - 吃了么</title>
  <style>
    /* ========== 全局样式与变量（与登录页保持一致） ========== */
    *, ::before, ::after {
      box-sizing: border-box;
      margin: 0;
    }
    :root {
      --background: 30 25% 97%;
      --foreground: 25 15% 20%;
      --card: 40 30% 99%;
      --card-foreground: 25 15% 20%;
      --primary: 20 85% 68%;
      --primary-foreground: 0 0% 100%;
      --secondary: 260 60% 75%;
      --secondary-foreground: 260 30% 15%;
      --accent: 160 55% 70%;
      --accent-foreground: 160 30% 15%;
      --muted: 350 20% 85%;
      --muted-foreground: 350 10% 45%;
      --border: 30 15% 88%;
      --input: 30 15% 88%;
      --ring: 20 85% 68%;
      --radius: 1rem;
      --shadow-soft: 0 2px 8px rgba(0, 0, 0, 0.06);
      --shadow-card: 0 4px 16px rgba(0, 0, 0, 0.08);
      --header-height: 56px;
    }
    body {
      background-color: hsl(var(--background));
      color: hsl(var(--foreground));
      font-family: -apple-system, "PingFang SC", "Noto Sans SC", system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    /* 头部样式 */
    .header {
      position: sticky;
      top: 0;
      z-index: 50;
      width: 100%;
      background-color: hsl(var(--card));
      border-bottom: 1px solid hsl(var(--border));
      box-shadow: var(--shadow-soft);
      padding: 0 1rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: var(--header-height);
    }
    .back-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 2.5rem;
      height: 2.5rem;
      border-radius: 0.375rem;
      cursor: pointer;
      transition: background 0.15s;
    }
    .back-btn:hover {
      background-color: hsl(var(--accent));
    }
    .back-btn svg {
      width: 1.5rem;
      height: 1.5rem;
      stroke: currentColor;
      stroke-width: 2.5;
    }
    .title {
      flex: 1;
      text-align: center;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: -0.025em;
      color: hsl(var(--foreground));
      padding: 0 0.5rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    /* 主内容区滚动 */
    .main-content {
      flex: 1;
      overflow-y: auto;
      padding: 1rem 1.25rem 2rem;
    }
    /* 卡片样式 */
    .card {
      border-radius: var(--radius);
      border: 1px solid hsl(var(--border));
      background-color: hsl(var(--card));
      box-shadow: var(--shadow-card);
    }
    .card-header {
      padding: 1.5rem 1.5rem 0.75rem;
    }
    .card-title {
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: -0.025em;
      margin-bottom: 0.25rem;
    }
    .card-desc {
      font-size: 0.875rem;
      color: hsl(var(--muted-foreground));
    }
    .card-content {
      padding: 0 1.5rem 1.5rem;
    }
    /* 表单样式 */
    .form-group {
      margin-bottom: 1rem;
    }
    .form-label {
      font-size: 0.875rem;
      font-weight: 500;
      display: block;
      margin-bottom: 0.5rem;
    }
    .radio-group {
      display: flex;
      gap: 1rem;
    }
    .radio-item {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      cursor: pointer;
    }
    .radio-item input {
      width: 1rem;
      height: 1rem;
      accent-color: hsl(var(--primary));
    }
    .input {
      width: 100%;
      height: 2.5rem;
      border-radius: calc(var(--radius) - 2px);
      border: 1px solid hsl(var(--input));
      background-color: hsl(var(--background));
      padding: 0 0.75rem;
      font-size: 1rem;
    }
    .input:focus {
      outline: none;
      ring: 2px solid hsl(var(--ring));
    }
    /* BMI 卡片内样式 */
    .bmi-value {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      margin-bottom: 1rem;
    }
    .bmi-number {
      font-size: 2.25rem;
      font-weight: 700;
      color: hsl(var(--primary));
    }
    .bmi-status {
      padding: 0.25rem 1rem;
      border-radius: 0.5rem;
      font-size: 0.875rem;
      font-weight: 500;
    }
    .status-healthy { background-color: #d1fae5; color: #065f46; }
    .status-underweight { background-color: #e0f2fe; color: #075985; }
    .status-overweight { background-color: #fed7aa; color: #9a3412; }
    .status-obese { background-color: #ffe4e6; color: #9f1239; }
    .bmi-advice {
      font-size: 0.875rem;
      font-weight: 500;
      margin: 0.75rem 0;
    }
    .bmi-advice-detail {
      font-size: 0.75rem;
      color: hsl(var(--muted-foreground));
      line-height: 1.5;
    }
    .reference-bar {
      margin-top: 1rem;
      border-top: 1px solid hsl(var(--border) / 0.5);
      padding-top: 1rem;
    }
    .reference-bar p {
      font-size: 0.75rem;
      color: hsl(var(--muted-foreground));
      margin-bottom: 0.5rem;
    }
    .ref-labels {
      display: flex;
      gap: 0.25rem;
      font-size: 0.625rem;
    }
    .ref-item {
      flex: 1;
      text-align: center;
    }
    .ref-color {
      height: 0.5rem;
      border-radius: 0.125rem;
      margin-bottom: 0.25rem;
    }
    /* 按钮 */
    .btn-primary {
      width: 100%;
      height: 3rem;
      background-color: hsl(var(--primary));
      color: hsl(var(--primary-foreground));
      border: none;
      border-radius: var(--radius);
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      margin-top: 1rem;
    }
    .btn-primary:hover {
      background-color: hsl(var(--primary) / 0.9);
    }
    .footer-note {
      text-align: center;
      font-size: 0.75rem;
      color: hsl(var(--muted-foreground));
      margin-top: 1rem;
    }
  </style>
</head>
<body>
  <!-- 头部 -->
  <header class="header">
    <div class="back-btn" id="backBtn">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 18l-6-6 6-6" />
      </svg>
    </div>
    <h1 class="title">个人信息</h1>
    <div style="width: 2.5rem;"></div> <!-- 占位保持居中 -->
  </header>

  <main class="main-content">
    <!-- 提示卡片 -->
    <div class="card" style="margin-bottom: 1.5rem; border-color: hsl(var(--primary) / 0.2); background-color: hsl(var(--primary) / 0.05);">
      <div class="card-header">
        <h3 class="card-title">完善个人信息</h3>
        <p class="card-desc">这些信息将帮助我们为您提供更精准的膳食建议</p>
      </div>
    </div>

    <!-- 表单 -->
    <div class="form-group">
      <label class="form-label">性别</label>
      <div class="radio-group" id="genderGroup">
        <label class="radio-item">
          <input type="radio" name="gender" value="female"> 女性
        </label>
        <label class="radio-item">
          <input type="radio" name="gender" value="male"> 男性
        </label>
        <label class="radio-item">
          <input type="radio" name="gender" value="other"> 其他
        </label>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label" for="age">年龄</label>
      <input type="number" id="age" class="input" placeholder="请输入年龄" min="18" max="120" value="28">
    </div>

    <div class="form-group">
      <label class="form-label" for="height">身高 (cm)</label>
      <input type="number" id="height" class="input" placeholder="请输入身高" min="100" max="250" value="165">
    </div>

    <div class="form-group">
      <label class="form-label" for="weight">体重 (kg)</label>
      <input type="number" id="weight" class="input" placeholder="请输入体重" min="20" max="300" value="55">
    </div>

    <!-- BMI 卡片 -->
    <div class="card" style="margin-top: 0.5rem;">
      <div class="card-header">
        <h3 class="card-title">BMI 健康指数</h3>
      </div>
      <div class="card-content">
        <div class="bmi-value">
          <div>
            <p class="card-desc" style="margin-bottom: 0.25rem;">当前BMI</p>
            <span class="bmi-number" id="bmiValue">21.3</span>
          </div>
          <div>
            <span class="bmi-status" id="bmiStatus">健康</span>
          </div>
        </div>
        <div id="bmiAdvice" class="bmi-advice">当前BMI处于相对健康区间。</div>
        <div id="bmiAdviceDetail" class="bmi-advice-detail">保持规律饮食与适量活动，继续稳定作息。</div>

        <div class="reference-bar">
          <p>健康区间参考</p>
          <div class="ref-labels">
            <div class="ref-item"><div class="ref-color" style="background: #7dd3fc;"></div>偏瘦</div>
            <div class="ref-item"><div class="ref-color" style="background: #6ee7b7;"></div>健康</div>
            <div class="ref-item"><div class="ref-color" style="background: #fcd34d;"></div>超重</div>
            <div class="ref-item"><div class="ref-color" style="background: #fda4af;"></div>肥胖</div>
          </div>
        </div>
      </div>
    </div>

    <!-- 确认按钮 -->
    <button class="btn-primary" id="submitBtn">确认信息并继续</button>
    <div class="footer-note">您可以在之后随时修改这些信息</div>
  </main>

  <script>
    // DOM 元素
    const genderRadios = document.querySelectorAll('input[name="gender"]');
    const ageInput = document.getElementById('age');
    const heightInput = document.getElementById('height');
    const weightInput = document.getElementById('weight');
    const bmiValueSpan = document.getElementById('bmiValue');
    const bmiStatusSpan = document.getElementById('bmiStatus');
    const bmiAdviceDiv = document.getElementById('bmiAdvice');
    const bmiAdviceDetailDiv = document.getElementById('bmiAdviceDetail');
    const submitBtn = document.getElementById('submitBtn');
    const backBtn = document.getElementById('backBtn');

    // 辅助函数：计算BMI并更新界面
    function updateBMI() {
      const heightCm = parseFloat(heightInput.value);
      const weightKg = parseFloat(weightInput.value);
      if (isNaN(heightCm) || isNaN(weightKg) || heightCm <= 0 || weightKg <= 0) {
        bmiValueSpan.textContent = '--';
        bmiStatusSpan.textContent = '未知';
        bmiAdviceDiv.textContent = '请输入有效的身高和体重';
        bmiAdviceDetailDiv.textContent = '';
        return;
      }
      const heightM = heightCm / 100;
      const bmi = weightKg / (heightM * heightM);
      const bmiFixed = bmi.toFixed(1);
      bmiValueSpan.textContent = bmiFixed;

      let status = '';
      let advice = '';
      let detail = '';
      let statusClass = '';

      if (bmi < 18.5) {
        status = '偏瘦';
        statusClass = 'status-underweight';
        advice = '体重偏轻，建议适当增加营养摄入。';
        detail = '多摄入优质蛋白和健康脂肪，保持三餐规律。';
      } else if (bmi >= 18.5 && bmi < 24) {
        status = '健康';
        statusClass = 'status-healthy';
        advice = '当前BMI处于相对健康区间。';
        detail = '保持规律饮食与适量活动，继续稳定作息。';
      } else if (bmi >= 24 && bmi < 28) {
        status = '超重';
        statusClass = 'status-overweight';
        advice = '体重超标，注意饮食控制和运动。';
        detail = '减少高热量食物，增加蔬菜和全谷物，每天坚持30分钟有氧运动。';
      } else {
        status = '肥胖';
        statusClass = 'status-obese';
        advice = '体重偏高，建议制定科学减重计划。';
        detail = '咨询营养师，控制总热量摄入，定期监测体重。';
      }

      bmiStatusSpan.textContent = status;
      bmiStatusSpan.className = `bmi-status ${statusClass}`;
      bmiAdviceDiv.textContent = advice;
      bmiAdviceDetailDiv.textContent = detail;
    }

    // 监听身高体重变化
    heightInput.addEventListener('input', updateBMI);
    weightInput.addEventListener('input', updateBMI);

    // 保存数据并跳转
    function saveAndContinue() {
      // 获取选中的性别
      let selectedGender = '';
      for (let radio of genderRadios) {
        if (radio.checked) {
          selectedGender = radio.value;
          break;
        }
      }
      const age = parseInt(ageInput.value) || 0;
      const height = parseFloat(heightInput.value) || 0;
      const weight = parseFloat(weightInput.value) || 0;
      const bmi = (height && weight) ? (weight / ((height/100)**2)).toFixed(1) : 0;

      // 保存到 localStorage
      const userProfile = {
        gender: selectedGender,
        age: age,
        height: height,
        weight: weight,
        bmi: bmi,
        updatedAt: new Date().toISOString()
      };
      localStorage.setItem('userProfile', JSON.stringify(userProfile));
      // 也可以标记用户已完成信息采集
      localStorage.setItem('profileCompleted', 'true');

      // 跳转到下一个页面（核心目标设定页）
      window.location.href = '核心目标设定页.html';
    }

    submitBtn.addEventListener('click', saveAndContinue);

    // 返回上一页（假设上一页是登录页）
    backBtn.addEventListener('click', () => {
      window.location.href = '登录注册页.html';
    });

    // 页面加载时，尝试读取已保存的个人信息并填充（如果有）
    function loadSavedProfile() {
      const saved = localStorage.getItem('userProfile');
      if (saved) {
        try {
          const profile = JSON.parse(saved);
          if (profile.gender) {
            for (let radio of genderRadios) {
              if (radio.value === profile.gender) {
                radio.checked = true;
                break;
              }
            }
          }
          if (profile.age) ageInput.value = profile.age;
          if (profile.height) heightInput.value = profile.height;
          if (profile.weight) weightInput.value = profile.weight;
          updateBMI(); // 重新计算BMI显示
        } catch(e) {}
      } else {
        // 默认选中女性
        genderRadios[0].checked = true;
        updateBMI();
      }
    }

    loadSavedProfile();
  </script>
</body>
</html>
