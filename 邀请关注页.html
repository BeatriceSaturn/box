<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>邀请关注 - 吃了么</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #fef9e8;
      font-family: -apple-system, "PingFang SC", "Noto Sans SC", system-ui, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem;
      background: #fff9f0;
      border-bottom: 1px solid #f0e4d4;
    }
    .back-btn {
      width: 2rem;
      height: 2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      border-radius: 50%;
    }
    .back-btn:hover { background: #f0e4d4; }
    .title { font-size: 1.1rem; font-weight: 600; color: #5a3e2b; }
    .main { flex: 1; overflow-y: auto; padding: 1rem; }
    .card {
      background: white;
      border-radius: 1rem;
      border: 1px solid #f0e4d4;
      padding: 1.5rem;
      margin-bottom: 1rem;
      text-align: center;
    }
    .link-box {
      background: #fffbf5;
      border-radius: 0.75rem;
      padding: 0.75rem;
      display: flex;
      gap: 0.5rem;
      align-items: center;
      margin: 1rem 0;
    }
    .link-input {
      flex: 1;
      background: white;
      border: 1px solid #f0e4d4;
      border-radius: 2rem;
      padding: 0.6rem;
      font-size: 0.8rem;
      color: #5a3e2b;
    }
    .copy-btn {
      background: #fdf3e8;
      border: none;
      border-radius: 2rem;
      padding: 0.6rem 1rem;
      cursor: pointer;
      font-weight: 500;
    }
    .qr-container {
      display: flex;
      justify-content: center;
      margin: 1rem 0;
    }
    .qr-code {
      width: 180px;
      height: 180px;
      background: white;
      padding: 0.5rem;
      border-radius: 1rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }
    .tip {
      background: #fff7f0;
      border-radius: 0.75rem;
      padding: 0.75rem;
      font-size: 0.8rem;
      color: #a07a5c;
      margin-top: 1rem;
    }
    .btn-secondary {
      width: 100%;
      background: #e67e22;
      border: none;
      border-radius: 2rem;
      padding: 0.8rem;
      font-weight: 600;
      color: white;
      cursor: pointer;
      margin-top: 1rem;
    }
  </style>
  <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore-compat.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyCVdUzsAMepg1knrDg4ID7tM3xb_0ILyPM",
      authDomain: "beatricesaturn-6ff7e.firebaseapp.com",
      projectId: "beatricesaturn-6ff7e",
      storageBucket: "beatricesaturn-6ff7e.firebasestorage.app",
      messagingSenderId: "607338984635",
      appId: "1:607338984635:web:a4b3668715462a4d0ca59e",
      measurementId: "G-L2R10QZZL9"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    auth.onAuthStateChanged(user => {
      if (user) {
        const uid = user.uid;
        const baseUrl = `${window.location.protocol}//${window.location.host}`;
        const inviteLink = `${baseUrl}/index.html?ref=${uid}`;
        document.getElementById('inviteLink').value = inviteLink;
        new QRCode(document.getElementById('qrcode'), {
          text: inviteLink,
          width: 160,
          height: 160,
          colorDark: "#5a3e2b",
          colorLight: "#ffffff",
          correctLevel: QRCode.CorrectLevel.H
        });
      } else {
        window.location.href = 'index.html';
      }
    });

    function copyLink() {
      const linkInput = document.getElementById('inviteLink');
      linkInput.select();
      document.execCommand('copy');
      alert('邀请链接已复制！');
    }

    document.getElementById('backBtn').addEventListener('click', () => {
      window.location.href = '亲友共享空间主页.html';
    });
  </script>
</head>
<body>
  <div class="header">
    <div class="back-btn" id="backBtn">←</div>
    <div class="title">邀请关注</div>
    <div style="width:2rem;"></div>
  </div>
  <div class="main">
    <div class="card">
      <h3 style="margin-bottom:1rem;">邀请亲友一起打卡</h3>
      <p style="font-size:0.85rem; color:#a07a5c;">分享你的专属链接，亲友注册后会自动添加为好友</p>
      <div class="link-box">
        <input type="text" id="inviteLink" class="link-input" readonly>
        <button class="copy-btn" onclick="copyLink()">复制</button>
      </div>
      <div class="qr-container">
        <div id="qrcode" class="qr-code"></div>
      </div>
      <div class="tip">
        💡 扫描二维码或复制链接发送给亲友，对方打开链接后注册账号，你们将自动成为好友，可以互相查看饮食打卡状态。
      </div>
      <button class="btn-secondary" id="shareBtn" onclick="alert('分享功能可调用微信/短信接口，请手动复制链接分享')">📤 分享链接</button>
    </div>
  </div>
</body>
</html>
