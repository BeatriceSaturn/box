<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>饮食百科 - 吃了么</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #fef9e8;
      font-family: -apple-system, "PingFang SC", "Noto Sans SC", system-ui, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem;
      background: #fff9f0;
      border-bottom: 1px solid #f0e4d4;
    }
    .back-btn {
      width: 2rem;
      height: 2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      border-radius: 50%;
    }
    .back-btn:hover { background: #f0e4d4; }
    .title { font-size: 1.1rem; font-weight: 600; color: #5a3e2b; }
    .main { flex: 1; overflow-y: auto; padding: 1rem; }
    .search-bar {
      position: sticky;
      top: 0;
      background: #fef9e8;
      padding-bottom: 0.75rem;
      z-index: 10;
    }
    .search-input {
      width: 100%;
      background: white;
      border: 1px solid #f0e4d4;
      border-radius: 2rem;
      padding: 0.7rem 1rem;
      font-size: 0.9rem;
    }
    .categories {
      display: flex;
      gap: 0.5rem;
      overflow-x: auto;
      padding: 0.5rem 0;
      margin-bottom: 1rem;
    }
    .category-btn {
      padding: 0.4rem 1rem;
      border-radius: 2rem;
      background: white;
      border: 1px solid #f0e4d4;
      font-size: 0.8rem;
      white-space: nowrap;
      cursor: pointer;
    }
    .category-btn.active {
      background: #e67e22;
      color: white;
      border-color: #e67e22;
    }
    .article-card {
      background: white;
      border-radius: 1rem;
      border: 1px solid #f0e4d4;
      padding: 1rem;
      margin-bottom: 1rem;
      display: flex;
      gap: 1rem;
      cursor: pointer;
    }
    .article-img {
      width: 4rem;
      height: 4rem;
      background: #fdf3e8;
      border-radius: 0.75rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
    }
    .article-info { flex: 1; }
    .article-title { font-weight: 600; margin-bottom: 0.25rem; }
    .article-desc { font-size: 0.75rem; color: #a07a5c; }
    .article-meta { display: flex; justify-content: space-between; margin-top: 0.5rem; font-size: 0.7rem; color: #c0a080; }
  </style>
</head>
<body>
  <div class="header">
    <div class="back-btn" id="backBtn">←</div>
    <div class="title">饮食百科</div>
    <div style="width:2rem;"></div>
  </div>
  <div class="main">
    <div class="search-bar">
      <input type="text" class="search-input" id="searchInput" placeholder="搜索文章、食谱、科普...">
    </div>
    <div class="categories" id="categories">
      <button class="category-btn active" data-cat="all">全部</button>
      <button class="category-btn" data-cat="tip">小贴士</button>
      <button class="category-btn" data-cat="recipe">食谱</button>
      <button class="category-btn" data-cat="science">科普</button>
    </div>
    <div id="articlesContainer"></div>
  </div>

  <script>
    const articles = [
      { id: 1, title: "忙碌日也要准时吃饭的三个小技巧", desc: "帮助上班族和上学族在高压环境里保住三餐节奏。", category: "tip", catName: "小贴士", emoji: "⏰", readTime: "4 分钟阅读" },
      { id: 2, title: "五分钟能完成的均衡早餐", desc: "适合早晨时间紧张的人群，快速完成并保持能量。", category: "recipe", catName: "食谱", emoji: "🥣", readTime: "5 分钟阅读" },
      { id: 3, title: "为什么情绪会影响食欲", desc: "从压力、疲劳和作息角度解释饮食波动。", category: "science", catName: "科普", emoji: "🧠", readTime: "6 分钟阅读" },
      { id: 4, title: "适合晚餐的轻负担搭配指南", desc: "减少晚间负担感，同时保证营养完整。", category: "tip", catName: "小贴士", emoji: "🌙", readTime: "5 分钟阅读" }
    ];

    let currentCategory = "all";
    let searchKeyword = "";

    function renderArticles() {
      let filtered = articles.filter(a => {
        if (currentCategory !== "all" && a.category !== currentCategory) return false;
        if (searchKeyword.trim() !== "") {
          const kw = searchKeyword.toLowerCase();
          return a.title.toLowerCase().includes(kw) || a.desc.toLowerCase().includes(kw);
        }
        return true;
      });
      const container = document.getElementById('articlesContainer');
      if (filtered.length === 0) {
        container.innerHTML = '<div style="text-align:center; padding:2rem;">没有找到相关文章</div>';
        return;
      }
      const html = filtered.map(a => `
        <div class="article-card" data-id="${a.id}">
          <div class="article-img">${a.emoji}</div>
          <div class="article-info">
            <div class="article-title">${escapeHtml(a.title)}</div>
            <div class="article-desc">${escapeHtml(a.desc)}</div>
            <div class="article-meta"><span>${a.catName}</span><span>${a.readTime}</span></div>
          </div>
        </div>
      `).join('');
      container.innerHTML = html;
      document.querySelectorAll('.article-card').forEach(card => {
        card.addEventListener('click', () => {
          const id = card.getAttribute('data-id');
          const article = articles.find(a => a.id == id);
          alert(`《${article.title}》\n\n${article.desc}\n\n阅读时间：${article.readTime}`);
        });
      });
    }

    function escapeHtml(str) { return str.replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }

    document.getElementById('searchInput').addEventListener('input', (e) => {
      searchKeyword = e.target.value;
      renderArticles();
    });
    document.querySelectorAll('.category-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentCategory = btn.getAttribute('data-cat');
        renderArticles();
      });
    });
    document.getElementById('backBtn').addEventListener('click', () => {
      window.location.href = '饮食管理首页.html';
    });
    renderArticles();
  </script>
</body>
</html>
